<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>너... 빌런이야?</title>
  <style>
    :root {
      --ink: #000;
      --paper: #fff;
      --modal-surface: #f5f5f5;
      --modal-shadow: rgba(0, 0, 0, 0.2);
      --muted-ink: #555;
      --surface: #f7f7f7;
      --surface-strong: #fff;
      --accent: #2f7dff;
      --accent-soft: #dbe8ff;
      --success: #20a35b;
      --danger: #d73b2e;
      --art-filter: none;
      --scale: 1;
      --font-heavy: "Arial Black", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      --font-ui: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-heavy);
      letter-spacing: 0;
    }

    body.dark-mode {
      --ink: #f6f6f6;
      --paper: #101010;
      --modal-surface: #1b1b1b;
      --modal-shadow: rgba(255, 255, 255, 0.16);
      --muted-ink: #cfcfcf;
      --surface: #171717;
      --surface-strong: #232323;
      --accent: #7fb2ff;
      --accent-soft: #183052;
      --success: #71d69a;
      --danger: #ff8378;
      --art-filter: invert(1) contrast(0.96);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-frame {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: var(--paper);
      transform: translate(-50%, -50%) scale(var(--scale));
      transform-origin: center;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
    }

    .screen.active {
      display: block;
    }

    .mockup {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
      user-select: none;
    }

    .hotspot {
      position: absolute;
      z-index: 30;
      padding: 0;
      color: transparent;
      background: transparent;
      border: 0;
      outline: 0;
    }

    .hotspot:focus-visible,
    .search-field:focus-visible {
      outline: 5px dashed rgba(0, 0, 0, 0.7);
      outline-offset: 6px;
    }

    body.dark-mode .hotspot:focus-visible,
    body.dark-mode .search-field:focus-visible {
      outline-color: rgba(255, 255, 255, 0.86);
    }

    .mockup,
    .paint-canvas,
    .result-card img {
      filter: var(--art-filter);
      transition: filter 180ms ease;
    }

    .nav-hotspots {
      position: absolute;
      inset: 0;
      z-index: 50;
      pointer-events: none;
    }

    .nav-hotspots .hotspot {
      pointer-events: auto;
    }

      left: 560px;

      width: 216px;
      height: 86px;
      border-radius: 999px;
    }

    .nav-workspace {
      left: 852px;
      top: 73px;
      width: 218px;
      height: 86px;
      border-radius: 999px;
    }

    .nav-result {
      left: 1144px;
      top: 73px;
      width: 216px;
      height: 86px;
      border-radius: 999px;
    }

    .is-studio .nav-hotspots {

    .workspace-controls,
    .workspace-rows,

    }

    .custom-room-label[data-row="1"] { top: 525px; }
    .custom-room-label[data-row="2"] { top: 653px; }
    .custom-room-label[data-row="3"] { top: 781px; }
    .custom-room-label[data-row="4"] { top: 909px; }

    #resultScreen {

      scrollbar-width: thin;

      top: 760px;

      font-family: var(--font-ui);

    .home-card span {

      font-family: var(--font-ui);

    .workspace-rows .room-card:hover {
      transform: translate(3px, 3px);
      box-shadow: 4px 4px 0 var(--ink);
    }

    .workspace-rows .room-card.is-selected {
      color: var(--paper);
      background: var(--ink);
    }

    .room-card-name {
      overflow: hidden;

    .room-card-meta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 214px;
      padding: 10px 16px;
      color: inherit;
      background: var(--surface);
      border: 4px solid currentColor;
      border-radius: 999px;
      font-size: 19px;
      font-weight: 900;
      line-height: 1;
    }

    .room-card-meta::before {
      width: 13px;
      height: 13px;
      background: var(--success);
      border: 3px solid currentColor;
      border-radius: 50%;
      content: "";
    }

    .room-card.is-selected .room-card-meta {

    .note-card {

      color: var(--ink);
      background: var(--paper);

      font-size: 26px;

    .tool-hot[data-row="1"] { top: 163px; }
    .tool-hot[data-row="2"] { top: 256px; }
    .tool-hot[data-row="3"] { top: 349px; }
    .tool-hot[data-row="4"] { top: 442px; }
    .tool-hot[data-row="5"] { top: 535px; }

    .studio-bottom-cover,

<body>

      <button class="hotspot nav-result" type="button" data-screen="result">결과물</button>

    <aside class="bottom-modal" id="bottomModal" aria-label="설정 모달" aria-expanded="false">

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <p class="sr-only" id="statusText"></p>

  <script>
    const $ = (selector, root = document) => root.querySelector(selector);
    const $$ = (selector, root = document) => [...root.querySelectorAll(selector)];

    const DESIGN = { width: 1920, height: 1080 };
    const PAINT = { x: 354, y: 0, width: 1566, height: 1080 };
    const ROW_TOPS = [366, 493, 621, 749, 877];
    const DEFAULT_ROOM = "000의 과제방";
    const STORAGE_KEY = "villain-page-state-v2";

    const frame = $("#appFrame");
    const toast = $("#toast");
    const statusText = $("#statusText");
    const paintCanvas = $("#paintCanvas");
    const paintCtx = paintCanvas.getContext("2d");
    const noteLayer = $("#noteLayer");
    const shapePreview = $("#shapePreview");
    const toolCursor = $("#toolCursor");
    const studioControls = $("#studioControls");
    const roomRows = $("#roomRows");
    const selectedRoomMark = $("#selectedRoomMark");
    const roomSearch = $("#roomSearch");
    const resultLayer = $("#resultLayer");
    const resultUpload = $("#resultUpload");
    const studioMockup = $("#studioMockup");
    const bottomModal = $("#bottomModal");
    const bottomModalTab = $("#bottomModalTab");
    const themeToggle = $("#themeToggle");
    const themeToggleState = $("#themeToggleState");
    const studioRoomTitle = $("#studioRoomTitle");
    const studioRoomStatus = $("#studioRoomStatus");
    const collabPanel = $("#collabPanel");
    const callStatus = $("#callStatus");
    const micToggle = $("#micToggle");
    const cameraToggle = $("#cameraToggle");
    const screenToggle = $("#screenToggle");
    const participantList = $("#participantList");
    const chatLog = $("#chatLog");
    const chatForm = $("#chatForm");
    const chatInput = $("#chatInput");

    const state = {
      screen: "home",
      activeTool: "brush",
      modalOpen: false,
      darkMode: false,
      micMuted: false,
      cameraOn: false,
      screenSharing: false,
      commentMode: false,
      focusMode: false,
      syncReady: true,
      versionCount: 0,
      selectedRoomId: null,
      rooms: Array.from({ length: 5 }, (_, index) => ({
        id: index + 1,
        name: DEFAULT_ROOM,
        custom: false
      })),
      shares: [],
      notes: [],
      chatMessages: [
        { id: 1, author: "시스템", text: "방에 들어오면 팀원 접속, 채팅, 통화 상태가 표시됩니다." }
      ],
      participants: [],
      drawing: false,
      panning: false,
      startPoint: null,
      lastPoint: null,
      undoStack: []
    };

    const makeId = () => (crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()));
    const getStoredId = () => {
      const stored = localStorage.getItem("villain-client-id");
      if (stored) return stored;
      const next = makeId();
      localStorage.setItem("villain-client-id", next);
      return next;
    };
    const localUser = {
      id: getStoredId(),
      name: localStorage.getItem("villain-display-name") || `guest ${Math.floor(100 + Math.random() * 900)}`,
      role: "나"
    };
    localStorage.setItem("villain-display-name", localUser.name);

    const canvasView = {
      scale: 1,
      x: 0,
      y: 0,
      panStart: null
    };

    const realtime = {
      socket: null,
      roomKey: null,
      connected: false,
      reconnectTimer: null,
      participants: new Map(),
      peers: new Map(),
      localStream: null,
      remoteAudio: new Map()
    };

    const fitFrame = () => {
      const scale = Math.min(window.innerWidth / DESIGN.width, window.innerHeight / DESIGN.height);
      frame.style.setProperty("--scale", String(scale));
    };

    const showToast = (message) => {
      toast.textContent = message;
      statusText.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1600);
    };

    const screenMap = {
      home: $("#homeScreen"),
      workspace: $("#workspaceScreen"),
      result: $("#resultScreen"),
      studio: $("#studioScreen")
    };

    const setScreen = (screen) => {
      state.screen = screen;
      Object.entries(screenMap).forEach(([name, element]) => {
        element.classList.toggle("active", name === screen);
      });
      frame.classList.toggle("is-studio", screen === "studio");
      if (screen === "studio" || screen === "result") {
        connectRealtime();
      }
      if (screen === "studio") {
        requestAnimationFrame(sizePaintCanvas);
        renderCollaborationPanel();
      }
      saveState();
    };

    const sizePaintCanvas = () => {
      const previous = paintCanvas.width ? paintCanvas.toDataURL("image/png") : null;
      const dpr = window.devicePixelRatio || 1;
      paintCanvas.width = Math.round(PAINT.width * dpr);
      paintCanvas.height = Math.round(PAINT.height * dpr);
      paintCanvas.style.width = `${PAINT.width}px`;
      paintCanvas.style.height = `${PAINT.height}px`;
      paintCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      paintCtx.lineCap = "round";
      paintCtx.lineJoin = "round";

      if (previous) {
        const image = new Image();
        image.onload = () => {
          paintCtx.clearRect(0, 0, PAINT.width, PAINT.height);
          paintCtx.drawImage(image, 0, 0, PAINT.width, PAINT.height);
        };
        image.src = previous;
      }
    };

    const applyCanvasView = () => {
      const transform = `translate(${canvasView.x}px, ${canvasView.y}px) scale(${canvasView.scale})`;
      paintCanvas.style.transform = transform;
      noteLayer.style.transform = transform;
    };

    const zoomCanvasAt = (event, factor) => {
      const oldScale = canvasView.scale;
      const nextScale = Math.max(0.35, Math.min(4, oldScale * factor));
      if (Math.abs(nextScale - oldScale) < 0.001) return;

      const frameRect = frame.getBoundingClientRect();
      const scale = getFrameScale();
      const localX = (event.clientX - frameRect.left) / scale;
      const localY = (event.clientY - frameRect.top) / scale;
      const paintPoint = toPaintPoint(event);

      canvasView.scale = nextScale;
      canvasView.x = localX - PAINT.x - paintPoint.x * nextScale;
      canvasView.y = localY - PAINT.y - paintPoint.y * nextScale;
      applyCanvasView();
      showToast(`확대 ${Math.round(nextScale * 100)}%`);
    };

    const resetCanvasView = () => {
      canvasView.scale = 1;
      canvasView.x = 0;
      canvasView.y = 0;
      applyCanvasView();
      showToast("캔버스 보기 초기화");
    };

    const toPaintPoint = (event) => {
      const rect = paintCanvas.getBoundingClientRect();
      return {
        x: Math.max(0, Math.min(PAINT.width, (event.clientX - rect.left) * (PAINT.width / rect.width))),
        y: Math.max(0, Math.min(PAINT.height, (event.clientY - rect.top) * (PAINT.height / rect.height)))
      };
    };

    const pushUndo = () => {
      state.undoStack.push(paintCanvas.toDataURL("image/png"));
      if (state.undoStack.length > 20) {
        state.undoStack.shift();
      }
    };

    const restoreCanvas = (dataUrl) => {
      if (!dataUrl) return;
      const image = new Image();
      image.onload = () => {
        paintCtx.clearRect(0, 0, PAINT.width, PAINT.height);
        paintCtx.drawImage(image, 0, 0, PAINT.width, PAINT.height);
      };
      image.src = dataUrl;
    };

    const drawSegment = (from, to) => {
      paintCtx.save();
      if (state.activeTool === "eraser") {
        paintCtx.globalCompositeOperation = "destination-out";
        paintCtx.lineWidth = 36;
      } else {
        paintCtx.globalCompositeOperation = "source-over";
        paintCtx.strokeStyle = "#000";
        paintCtx.lineWidth = state.activeTool === "line" || state.activeTool === "lasso" ? 7 : 8;
        if (state.activeTool === "lasso") {
          paintCtx.setLineDash([18, 12]);
        }
      }
      paintCtx.beginPath();
      paintCtx.moveTo(from.x, from.y);
      paintCtx.lineTo(to.x, to.y);
      paintCtx.stroke();
      paintCtx.restore();
    };

    const drawRoughEllipse = (start, end) => {
      const x = Math.min(start.x, end.x);
      const y = Math.min(start.y, end.y);
      const width = Math.abs(end.x - start.x);
      const height = Math.abs(end.y - start.y);
      if (width < 10 || height < 10) return;

      paintCtx.save();
      paintCtx.strokeStyle = "#000";
      paintCtx.lineWidth = 6;
      for (let i = 0; i < 3; i += 1) {
        paintCtx.beginPath();
        paintCtx.ellipse(x + width / 2 + i - 1, y + height / 2 - i, width / 2, height / 2, 0, 0, Math.PI * 2);
        paintCtx.stroke();
      }
      paintCtx.restore();
    };

    const drawRoughRect = (start, end) => {
      const x = Math.min(start.x, end.x);
      const y = Math.min(start.y, end.y);
      const width = Math.abs(end.x - start.x);
      const height = Math.abs(end.y - start.y);
      if (width < 10 || height < 10) return;

      paintCtx.save();
      paintCtx.strokeStyle = "#000";
      paintCtx.lineWidth = 6;
      for (let i = 0; i < 3; i += 1) {
        paintCtx.strokeRect(x + i * 2 - 2, y - i + 2, width + i, height - i);
      }
      paintCtx.restore();
    };

    const drawTriangle = (start, end) => {
      const x = Math.min(start.x, end.x);
      const y = Math.min(start.y, end.y);
      const width = Math.abs(end.x - start.x);
      const height = Math.abs(end.y - start.y);
      if (width < 12 || height < 12) return;

      paintCtx.save();
      paintCtx.strokeStyle = "#000";
      paintCtx.lineWidth = 7;
      paintCtx.beginPath();
      paintCtx.moveTo(x + width / 2, y);
      paintCtx.lineTo(x + width, y + height);
      paintCtx.lineTo(x, y + height);
      paintCtx.closePath();
      paintCtx.stroke();
      paintCtx.restore();
    };

    const stampAt = (point, tool) => {
      pushUndo();
      paintCtx.save();
      paintCtx.strokeStyle = "#000";
      paintCtx.fillStyle = "#000";
      paintCtx.lineWidth = 7;

      if (tool === "spark") {
        for (let i = 0; i < 10; i += 1) {
          const angle = (Math.PI * 2 * i) / 10;
          paintCtx.beginPath();
          paintCtx.moveTo(point.x, point.y);
          paintCtx.lineTo(point.x + Math.cos(angle) * 54, point.y + Math.sin(angle) * 54);
          paintCtx.stroke();
        }
      }

      if (tool === "fill") {
        paintCtx.globalAlpha = 0.16;
        paintCtx.fillRect(Math.max(0, point.x - 120), Math.max(0, point.y - 80), 240, 160);
        paintCtx.globalAlpha = 1;
        paintCtx.strokeRect(Math.max(0, point.x - 120), Math.max(0, point.y - 80), 240, 160);
      }

      if (tool === "pattern") {
        for (let x = point.x - 72; x <= point.x + 72; x += 18) {
          for (let y = point.y - 72; y <= point.y + 72; y += 18) {
            paintCtx.fillRect(x, y, 8, 8);
          }
        }
      }

      if (tool === "stamp") {
        paintCtx.beginPath();
        paintCtx.arc(point.x, point.y - 28, 24, 0, Math.PI * 2);
        paintCtx.stroke();
        paintCtx.strokeRect(point.x - 42, point.y + 4, 84, 52);
        paintCtx.beginPath();
        paintCtx.moveTo(point.x - 58, point.y + 62);
        paintCtx.lineTo(point.x + 58, point.y + 62);
        paintCtx.stroke();
      }

      if (tool === "drop") {
        paintCtx.beginPath();
        paintCtx.moveTo(point.x, point.y - 58);
        paintCtx.bezierCurveTo(point.x + 42, point.y - 6, point.x + 32, point.y + 54, point.x, point.y + 64);
        paintCtx.bezierCurveTo(point.x - 32, point.y + 54, point.x - 42, point.y - 6, point.x, point.y - 58);
        paintCtx.stroke();
      }

      paintCtx.restore();
      saveState();
    };

    const setShapePreview = (start, end) => {
      const x = Math.min(start.x, end.x);
      const y = Math.min(start.y, end.y);
      const width = Math.abs(end.x - start.x);
      const height = Math.abs(end.y - start.y);
      Object.assign(shapePreview.style, {
        display: "block",
        left: `${PAINT.x + canvasView.x + x * canvasView.scale}px`,
        top: `${PAINT.y + canvasView.y + y * canvasView.scale}px`,
        width: `${width * canvasView.scale}px`,
        height: `${height * canvasView.scale}px`
      });
    };

    const applyModalState = () => {
      bottomModal.classList.toggle("is-open", state.modalOpen);
      bottomModal.setAttribute("aria-expanded", String(state.modalOpen));
      bottomModalTab.setAttribute("aria-expanded", String(state.modalOpen));

    const setModalOpen = (open) => {
      state.modalOpen = open;
      applyModalState();
      saveState();
    };

    const applyTheme = () => {
      document.body.classList.toggle("dark-mode", state.darkMode);
      themeToggle.setAttribute("aria-pressed", String(state.darkMode));
      themeToggleState.textContent = state.darkMode ? "켜짐" : "꺼짐";
    };

    const setDarkMode = (enabled) => {
      state.darkMode = enabled;
      applyTheme();

    const currentRoomName = () => {
      const room = state.rooms.find((item) => item.id === state.selectedRoomId);
      return room?.name || DEFAULT_ROOM;
    };

    const currentRoomKey = () => {
      const room = state.rooms.find((item) => item.id === state.selectedRoomId);
      return String(room?.id || "lobby");
    };

    const getFrameScale = () => Number(getComputedStyle(frame).getPropertyValue("--scale")) || 1;

    const updateLocalParticipant = () => {
      const participant = {
        ...localUser,
        micMuted: state.micMuted,
        cameraOn: state.cameraOn,
        screenSharing: state.screenSharing,
        calling: Boolean(realtime.localStream),
        self: true,
        updatedAt: Date.now()
      };
      realtime.participants.set(localUser.id, participant);
      state.participants = [...realtime.participants.values()];
      return participant;
    };

    const visibleParticipants = () => {
      updateLocalParticipant();
      return [...realtime.participants.values()].sort((a, b) => {
        if (a.id === localUser.id) return -1;
        if (b.id === localUser.id) return 1;
        return (a.name || "").localeCompare(b.name || "");
      });
    };

    const sendRealtime = (payload) => {
      if (!realtime.connected || realtime.socket?.readyState !== WebSocket.OPEN) return false;
      realtime.socket.send(JSON.stringify({
        ...payload,
        room: currentRoomKey(),
        user: updateLocalParticipant()
      }));
      return true;
    };

    const broadcastPresence = () => {
      updateLocalParticipant();
      sendRealtime({ type: "presence" });
      renderCollaborationPanel();
    };

    const connectRealtime = () => {
      if (location.protocol === "file:") {
        realtime.connected = false;
        updateLocalParticipant();
        renderCollaborationPanel();
        return;
      }

      const roomKey = currentRoomKey();
      if (realtime.connected && realtime.roomKey === roomKey) return;
      if (realtime.socket) {
        realtime.socket.close();
      }

      const realtimeBase = window.VILLAIN_REALTIME_BASE || "";
      const base = realtimeBase ? new URL(realtimeBase, location.href) : location;
      const scheme = base.protocol === "https:" ? "wss:" : "ws:";
      const prefix = realtimeBase ? base.pathname.replace(/\/$/, "") : "";
      const url = `${scheme}//${base.host}${prefix}/api/room/${encodeURIComponent(roomKey)}/ws`;
      realtime.roomKey = roomKey;
      realtime.socket = new WebSocket(url);

      realtime.socket.addEventListener("open", () => {
        realtime.connected = true;
        realtime.participants.clear();
        updateLocalParticipant();
        sendRealtime({ type: "join" });
        renderCollaborationPanel();
        showToast("실시간 작업공간 연결 완료");
      });

      realtime.socket.addEventListener("message", (event) => {
        try {
          handleRealtimeMessage(JSON.parse(event.data));
        } catch {
          showToast("실시간 메시지를 읽지 못했습니다.");
        }
      });

      realtime.socket.addEventListener("close", () => {
        realtime.connected = false;
        realtime.participants.clear();
        updateLocalParticipant();
        renderCollaborationPanel();
        clearTimeout(realtime.reconnectTimer);
        if (state.screen === "studio") {
          realtime.reconnectTimer = setTimeout(connectRealtime, 1600);
        }
      });
    };

    const handleRealtimeMessage = async (message) => {
      if (!message || message.room !== currentRoomKey()) return;

      if (Array.isArray(message.participants)) {
        realtime.participants.clear();
        message.participants.forEach((participant) => realtime.participants.set(participant.id, participant));
        updateLocalParticipant();
        renderCollaborationPanel();
      }

      if (message.type === "init") {
        if (Array.isArray(message.messages) && message.messages.length) {
          state.chatMessages = message.messages;
        }
        if (Array.isArray(message.shares)) {
          state.shares = message.shares;
        }
        renderCollaborationPanel();
        renderResults();
        saveState();
      }

      if (message.type === "chat" && message.message) {
        addTeamMessage(message.message.author, message.message.text, {
          id: message.message.id,
          broadcast: false
        });
      }

      if (message.type === "share" && message.share && !state.shares.some((item) => String(item.id) === String(message.share.id))) {
        state.shares.unshift(message.share);
        renderResults();
        saveState(true);
      }

      if (message.type === "comment") {
        const share = state.shares.find((item) => String(item.id) === String(message.shareId));
        if (share) {
          share.comments = Array.isArray(share.comments) ? share.comments : [];
          if (!share.comments.some((item) => item.id === message.comment?.id)) {
            share.comments.push(message.comment);
          }
          renderResults();
          saveState();
        }
      }

      if (message.type === "reaction") {
        const share = state.shares.find((item) => String(item.id) === String(message.shareId));
        if (share) {
          share.reactions = Math.max(share.reactions || 0, message.reactions || 0);
          renderResults();
          saveState();
        }
      }

      if (message.type === "signal" && message.to === localUser.id) {
        await handleSignal(message.from, message.signal);
      }
    };

    const trimChatMessages = () => {
      state.chatMessages = state.chatMessages.slice(-80);
    };

    const addTeamMessage = (author, text, options = {}) => {
      const id = options.id || makeId();
      if (state.chatMessages.some((message) => message.id === id)) return;
      const message = {
        id,
        author,
        text,
        createdAt: Date.now()
      };
      state.chatMessages.push(message);
      trimChatMessages();
      renderCollaborationPanel();
      saveState();
      if (options.broadcast) {
        sendRealtime({ type: "chat", message });
      }
    };

    const ensureLocalStream = async () => {
      if (realtime.localStream) return realtime.localStream;
      if (!navigator.mediaDevices?.getUserMedia) {
        showToast("이 브라우저에서 통화를 지원하지 않습니다.");
        throw new Error("media devices unsupported");
      }
      realtime.localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      realtime.localStream.getAudioTracks().forEach((track) => {
        track.enabled = !state.micMuted;
      });
      broadcastPresence();
      return realtime.localStream;
    };

    const ensurePeer = async (peerId) => {
      if (realtime.peers.has(peerId)) return realtime.peers.get(peerId);
      const peer = new RTCPeerConnection({
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
      });
      realtime.peers.set(peerId, peer);

      peer.onicecandidate = (event) => {
        if (event.candidate) {
          sendRealtime({
            type: "signal",
            to: peerId,
            from: localUser.id,
            signal: { candidate: event.candidate }
          });
        }
      };

      peer.ontrack = (event) => {
        let audio = realtime.remoteAudio.get(peerId);
        if (!audio) {
          audio = document.createElement("audio");
          audio.autoplay = true;
          audio.playsInline = true;
          audio.dataset.peer = peerId;
          document.body.appendChild(audio);
          realtime.remoteAudio.set(peerId, audio);
        }
        audio.srcObject = event.streams[0];
      };

      if (realtime.localStream) {
        realtime.localStream.getTracks().forEach((track) => peer.addTrack(track, realtime.localStream));
      }
      return peer;
    };

    const callParticipant = async (peerId) => {
      if (peerId === localUser.id) return;
      const stream = await ensureLocalStream();
      const peer = await ensurePeer(peerId);
      stream.getTracks().forEach((track) => {
        if (!peer.getSenders().some((sender) => sender.track === track)) {
          peer.addTrack(track, stream);
        }
      });
      const offer = await peer.createOffer();
      await peer.setLocalDescription(offer);
      sendRealtime({
        type: "signal",
        to: peerId,
        from: localUser.id,
        signal: peer.localDescription
      });
    };

    const startVoiceCall = async () => {
      try {
        await ensureLocalStream();
        state.micMuted = false;
        realtime.localStream.getAudioTracks().forEach((track) => {
          track.enabled = true;
        });
        broadcastPresence();
        visibleParticipants()
          .filter((participant) => participant.id !== localUser.id)
          .forEach((participant) => callParticipant(participant.id));
        addTeamMessage("시스템", "음성 통화를 연결했습니다.");
      } catch {
        showToast("마이크 권한이 필요합니다.");
      }
    };

    const handleSignal = async (peerId, signal) => {
      if (!peerId || !signal) return;
      const peer = await ensurePeer(peerId);

      if (signal.type === "offer") {
        await ensureLocalStream();
        realtime.localStream.getTracks().forEach((track) => {
          if (!peer.getSenders().some((sender) => sender.track === track)) {
            peer.addTrack(track, realtime.localStream);
          }
        });
        await peer.setRemoteDescription(new RTCSessionDescription(signal));
        const answer = await peer.createAnswer();
        await peer.setLocalDescription(answer);
        sendRealtime({
          type: "signal",
          to: peerId,
          from: localUser.id,
          signal: peer.localDescription
        });
        return;
      }

      if (signal.type === "answer") {
        await peer.setRemoteDescription(new RTCSessionDescription(signal));
        return;
      }

      if (signal.candidate) {
        await peer.addIceCandidate(new RTCIceCandidate(signal.candidate));
      }
    };

    const applyCollabMode = () => {
      frame.classList.toggle("focus-mode", state.focusMode);
    };

    const renderCollaborationPanel = () => {
      const participants = visibleParticipants();
      const mutedCount = participants.filter((participant) => participant.micMuted).length;
      studioRoomTitle.textContent = currentRoomName();
      studioRoomStatus.textContent = state.screenSharing

      callStatus.textContent = realtime.connected
        ? `${participants.length}명 접속 · ${mutedCount}명 음소거 · ${state.syncReady ? "동기화 완료" : "동기화 대기"}`
        : "실시간 서버 연결 대기 · 배포 후 Worker 연결 필요";

      micToggle.textContent = realtime.localStream
        ? (state.micMuted ? "마이크 꺼짐" : "마이크 켜짐")
        : "통화 시작";
      micToggle.classList.toggle("is-danger", state.micMuted);
      micToggle.setAttribute("aria-pressed", String(state.micMuted));

      cameraToggle.textContent = state.cameraOn ? "카메라 켜짐" : "카메라 꺼짐";
      cameraToggle.classList.toggle("is-active", state.cameraOn);
      cameraToggle.setAttribute("aria-pressed", String(state.cameraOn));

      screenToggle.textContent = state.screenSharing ? "공유 중" : "화면 공유";
      screenToggle.classList.toggle("is-active", state.screenSharing);
      screenToggle.setAttribute("aria-pressed", String(state.screenSharing));

      participantList.innerHTML = "";
      participants.forEach((member) => {
        const button = document.createElement("button");
        const muted = Boolean(member.micMuted);
        button.className = `participant-row${muted ? " is-muted" : ""}`;
        button.type = "button";
        button.disabled = true;

        const dot = document.createElement("span");
        dot.className = "presence-dot";
        dot.setAttribute("aria-hidden", "true");

        const name = document.createElement("span");
        name.textContent = `${member.name}${member.id === localUser.id ? " · 나" : ""}`;

        const status = document.createElement("span");
        status.className = "participant-state";
        status.textContent = member.calling ? (muted ? "음소거" : "통화중") : "접속";

        button.append(dot, name, status);
        participantList.appendChild(button);
      });

      $$(".feature-chip", collabPanel).forEach((button) => {
        const feature = button.dataset.feature;
        button.classList.toggle("is-active", (
          (feature === "comment" && state.commentMode) ||
          (feature === "focus" && state.focusMode) ||
          (feature === "sync" && state.syncReady)
        ));
        if (feature === "version") {
          button.textContent = state.versionCount ? `버전 ${state.versionCount}` : "버전 저장";
        }
        if (feature === "sync") {
          button.textContent = state.syncReady ? "동기화 완료" : "동기화";
        }
      });

      chatLog.innerHTML = "";
      state.chatMessages.slice(-24).forEach((message) => {
        const line = document.createElement("div");
        line.className = "chat-line";
        const author = document.createElement("strong");
        author.textContent = message.author;
        const text = document.createElement("span");
        text.textContent = message.text;
        line.append(author, text);
        chatLog.appendChild(line);
      });
      requestAnimationFrame(() => {
        chatLog.scrollTop = chatLog.scrollHeight;
      });

      applyCollabMode();
    };

    const createNote = (point, text = "메모") => {
      const note = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        x: Math.max(0, Math.min(point.x, PAINT.width - 210)),
        y: Math.max(0, Math.min(point.y, PAINT.height - 90)),
        text
      };
      state.notes.push(note);
      renderNotes();
      saveState();
      return note;
    };

    const renderNotes = () => {
      noteLayer.innerHTML = state.notes.map((note) => `
        <div class="note-card" contenteditable="true" spellcheck="false" data-note="${note.id}" style="left:${note.x}px;top:${note.y}px">${note.text}</div>
      `).join("");

      $$(".note-card", noteLayer).forEach((element) => {
        element.addEventListener("input", () => {
          const note = state.notes.find((item) => item.id === element.dataset.note);
          if (note) {
            note.text = element.textContent.trim() || "메모";
            saveState();
          }

        element.addEventListener("pointerdown", (event) => event.stopPropagation());
      });

    const renderRooms = () => {

      roomRows.innerHTML = "";

      visibleRooms.forEach((room, index) => {
        const button = document.createElement("button");
        button.className = `room-card${room.id === state.selectedRoomId ? " is-selected" : ""}`;
        button.type = "button";
        button.dataset.room = String(room.id);

        const name = document.createElement("span");
        name.className = "room-card-name";
        name.textContent = room.name;

        const meta = document.createElement("span");
        meta.className = "room-card-meta";
        meta.textContent = "실시간 협업 · 통화 가능";

        button.append(name, meta);
        button.addEventListener("click", () => {
          state.selectedRoomId = room.id;
          renderRooms();
          saveState();
          showToast("방 선택됨. 한 번 더 누르면 입장합니다.");
        });

        roomRows.appendChild(button);

    const renderRoomSelection = () => {

    const enterSelectedRoom = (roomId = state.selectedRoomId) => {

    $("#createRoom").addEventListener("click", () => {

      };

    const toolButtons = [
      ["select", 0, 0],
      ["shape", 1, 0],
      ["lasso", 0, 1],
      ["spark", 1, 1],
      ["hand", 0, 2],
      ["zoom", 1, 2],
      ["crop", 0, 3],
      ["text", 1, 3],
      ["fill", 0, 4],
      ["pattern", 1, 4],
      ["line", 0, 5],
      ["arrow", 1, 5],
      ["eraser", 0, 6],

    const handleSideAction = async (action) => {
      if (action === "leave") {

        showToast("작업공간 목록으로 이동");

      if (action === "save") {

        showToast("현재 작업 저장 완료");

      if (action === "share") {
        const image = await composeStudioImage();
        const share = {
          id: Date.now(),
          title: `결과물 ${String(state.shares.length + 1).padStart(2, "0")}`,
          image,
          author: currentRoomName(),
          reactions: 0,
          comments: []
        };
        state.shares.unshift(share);
        sendRealtime({ type: "share", share });
        renderResults();
        setScreen("result");
        saveState(true);
        showToast("결과물 탭에 공유 완료");
      }
      if (action === "export") {
        const link = document.createElement("a");
        link.href = await composeStudioImage();
        link.download = "villain-work.png";
        link.click();
        showToast("PNG 내보내기 완료");
      }
    };

    paintCanvas.addEventListener("pointerdown", (event) => {
      if (state.screen !== "studio") return;
      const point = toPaintPoint(event);

      if (state.activeTool === "hand") {
        state.panning = true;
        const frameScale = getFrameScale();
        canvasView.panStart = {
          clientX: event.clientX,
          clientY: event.clientY,
          x: canvasView.x,
          y: canvasView.y,
          frameScale
        };
        paintCanvas.style.cursor = "grabbing";
        paintCanvas.setPointerCapture(event.pointerId);
        return;
      }

      if (state.activeTool === "zoom") {
        zoomCanvasAt(event, event.shiftKey || event.altKey ? 0.82 : 1.18);
        return;
      }

      if (state.activeTool === "text") {
        createNote(point);
        showToast("메모 추가");
        return;
      }

      if (["spark", "fill", "pattern", "stamp", "drop"].includes(state.activeTool)) {
        stampAt(point, state.activeTool);
        return;
      }

      if (state.activeTool === "voice") {
        startVoiceCall();
        return;
      }

      if (!["brush", "eraser", "shape", "line", "arrow", "lasso", "triangle"].includes(state.activeTool)) {
        return;
      }

      pushUndo();
      state.drawing = true;
      state.startPoint = point;
      state.lastPoint = point;
      paintCanvas.setPointerCapture(event.pointerId);

      if (state.activeTool === "shape" || state.activeTool === "triangle") {
        setShapePreview(point, point);
      }
    });

    paintCanvas.addEventListener("pointermove", (event) => {
      if (state.panning && canvasView.panStart) {
        const scale = canvasView.panStart.frameScale || getFrameScale();
        canvasView.x = canvasView.panStart.x + (event.clientX - canvasView.panStart.clientX) / scale;
        canvasView.y = canvasView.panStart.y + (event.clientY - canvasView.panStart.clientY) / scale;
        applyCanvasView();
        return;
      }

      if (!state.drawing || !state.lastPoint) return;
      const point = toPaintPoint(event);

      if (state.activeTool === "shape" || state.activeTool === "triangle") {
        setShapePreview(state.startPoint, point);
        return;
      }

      if (state.activeTool === "line" || state.activeTool === "arrow") {
        return;
      }

      drawSegment(state.lastPoint, point);
      state.lastPoint = point;
    });

    const finishDrawing = (event) => {
      if (state.panning) {
        state.panning = false;
        canvasView.panStart = null;
        paintCanvas.style.cursor = "grab";
        return;
      }

      if (!state.drawing || !state.startPoint) return;
      const point = toPaintPoint(event);

      if (state.activeTool === "shape") {
        drawRoughEllipse(state.startPoint, point);
        shapePreview.style.display = "none";
      }

      if (state.activeTool === "triangle") {
        drawTriangle(state.startPoint, point);
        shapePreview.style.display = "none";
      }

      if (state.activeTool === "line" || state.activeTool === "arrow") {
        drawSegment(state.startPoint, point);
        if (state.activeTool === "arrow") {
          drawArrowHead(state.startPoint, point);
        }
      }

      state.drawing = false;
      state.startPoint = null;
      state.lastPoint = null;
      saveState();
    };

    paintCanvas.addEventListener("pointerup", finishDrawing);
    paintCanvas.addEventListener("pointercancel", finishDrawing);
    paintCanvas.addEventListener("wheel", (event) => {
      if (state.screen !== "studio") return;
      event.preventDefault();
      zoomCanvasAt(event, event.deltaY < 0 ? 1.1 : 0.9);
    }, { passive: false });

    const drawArrowHead = (from, to) => {
      const angle = Math.atan2(to.y - from.y, to.x - from.x);
      const size = 24;
      paintCtx.save();
      paintCtx.strokeStyle = "#000";
      paintCtx.lineWidth = 7;
      paintCtx.beginPath();
      paintCtx.moveTo(to.x, to.y);
      paintCtx.lineTo(to.x - size * Math.cos(angle - Math.PI / 6), to.y - size * Math.sin(angle - Math.PI / 6));
      paintCtx.moveTo(to.x, to.y);
      paintCtx.lineTo(to.x - size * Math.cos(angle + Math.PI / 6), to.y - size * Math.sin(angle + Math.PI / 6));
      paintCtx.stroke();
      paintCtx.restore();
    };

    const composeStudioImage = async () => {
      const output = document.createElement("canvas");
      output.width = DESIGN.width;
      output.height = DESIGN.height;
      const outputCtx = output.getContext("2d");
      await drawImageElement(outputCtx, studioMockup, 0, 0, DESIGN.width, DESIGN.height);
      outputCtx.drawImage(paintCanvas, PAINT.x, PAINT.y, PAINT.width, PAINT.height);
      drawNotesForExport(outputCtx);
      return output.toDataURL("image/png");
    };

    const drawImageElement = (ctx, image, x, y, width, height) => new Promise((resolve) => {
      if (image.complete) {
        ctx.drawImage(image, x, y, width, height);
        resolve();
        return;
      }
      image.onload = () => {
        ctx.drawImage(image, x, y, width, height);
        resolve();
      };
    });

    const drawNotesForExport = (ctx) => {
      ctx.save();
      ctx.font = "900 26px Malgun Gothic, sans-serif";
      ctx.lineWidth = 6;
      ctx.strokeStyle = "#000";
      ctx.fillStyle = "#fff";
      state.notes.forEach((note) => {
        const x = PAINT.x + note.x;
        const y = PAINT.y + note.y;
        const text = note.text || "메모";
        const width = Math.max(170, ctx.measureText(text).width + 34);
        const height = 62;
        ctx.fillRect(x, y, width, height);
        ctx.strokeRect(x, y, width, height);
        ctx.fillStyle = "#000";
        ctx.fillText(text, x + 16, y + 40);
        ctx.fillStyle = "#fff";
      });
      ctx.restore();
    };

    const ensureShareMeta = (share, index) => {
      share.id = share.id || Date.now() + index;
      share.title = share.title || `결과물 ${String(index + 1).padStart(2, "0")}`;
      share.author = share.author || "조별과제 팀";
      share.reactions = Number.isFinite(share.reactions) ? share.reactions : 0;
      share.comments = Array.isArray(share.comments) ? share.comments : [];
      return share;
    };

    const renderResults = () => {
      resultLayer.innerHTML = "";

      const upload = document.createElement("section");
      upload.className = "result-upload";

      const uploadCopy = document.createElement("div");
      const title = document.createElement("strong");
      title.textContent = "완성본 공유";
      const description = document.createElement("span");
      description.textContent = "팀 완성본과 피드백 모음";
      uploadCopy.append(title, description);

      const uploadButton = document.createElement("button");
      uploadButton.type = "button";
      uploadButton.dataset.resultUpload = "true";
      uploadButton.textContent = "결과물 올리기";
      upload.append(uploadCopy, uploadButton);
      resultLayer.appendChild(upload);

      if (!state.shares.length) {
        const empty = document.createElement("article");
        empty.className = "share-card";
        const placeholder = document.createElement("div");
        placeholder.className = "result-upload";
        placeholder.innerHTML = "<strong>공유 대기 중</strong><span>새 완성본 없음</span>";
        empty.appendChild(placeholder);
        resultLayer.appendChild(empty);
        return;
      }

      state.shares.forEach((rawShare, index) => {
        const share = ensureShareMeta(rawShare, index);
        const card = document.createElement("article");
        card.className = "share-card";

        const image = document.createElement("img");
        image.src = share.image;
        image.alt = share.title;

        const body = document.createElement("div");
        body.className = "share-body";

        const heading = document.createElement("h3");
        heading.className = "share-title";
        heading.textContent = share.title;

        const meta = document.createElement("div");
        meta.className = "share-meta";
        meta.textContent = `${share.author} · 댓글 ${share.comments.length}개`;

        const actions = document.createElement("div");
        actions.className = "share-actions";

        const react = document.createElement("button");
        react.className = "share-action";
        react.type = "button";
        react.dataset.resultAction = "react";
        react.dataset.result = String(share.id);
        react.textContent = `반응 ${share.reactions}`;

        const shareButton = document.createElement("button");
        shareButton.className = "share-action";
        shareButton.type = "button";
        shareButton.dataset.resultAction = "share";
        shareButton.dataset.result = String(share.id);
        shareButton.textContent = "공유";

        actions.append(react, shareButton);

        const comments = document.createElement("div");
        comments.className = "comment-list";
        share.comments.slice(-3).forEach((comment) => {
          const line = document.createElement("div");
          line.className = "comment-line";
          const author = document.createElement("strong");
          author.textContent = comment.author;
          const text = document.createElement("span");
          text.textContent = comment.text;
          line.append(author, text);
          comments.appendChild(line);
        });

        const form = document.createElement("form");
        form.className = "comment-form";
        form.dataset.resultComment = String(share.id);

        const input = document.createElement("input");
        input.type = "text";
        input.maxLength = 46;
        input.placeholder = "댓글";
        input.setAttribute("aria-label", `${share.title} 댓글`);

        const submit = document.createElement("button");
        submit.type = "submit";
        submit.textContent = "등록";
        form.append(input, submit);

        body.append(heading, meta, actions, comments, form);
        card.append(image, body);
        resultLayer.appendChild(card);
      });
    };

    const saveState = (includeCanvas = false) => {
      const payload = {
        screen: state.screen,
        modalOpen: state.modalOpen,
        darkMode: state.darkMode,
        micMuted: state.micMuted,
        cameraOn: state.cameraOn,
        screenSharing: state.screenSharing,
        commentMode: state.commentMode,
        focusMode: state.focusMode,
        syncReady: state.syncReady,
        versionCount: state.versionCount,
        selectedRoomId: state.selectedRoomId,
        rooms: state.rooms,
        shares: state.shares,
        notes: state.notes,
        chatMessages: state.chatMessages,
        participants: state.participants,
        canvas: includeCanvas ? paintCanvas.toDataURL("image/png") : undefined
      };
      if (!includeCanvas) {
        const old = loadRawState();
        payload.canvas = old?.canvas;
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    };

    const loadRawState = () => {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
      } catch {
        return null;
      }
    };

    const loadState = () => {
      const saved = loadRawState();
      if (!saved) return;
      state.modalOpen = Boolean(saved.modalOpen);
      state.darkMode = Boolean(saved.darkMode);
      state.micMuted = Boolean(saved.micMuted);
      state.cameraOn = Boolean(saved.cameraOn);
      state.screenSharing = Boolean(saved.screenSharing);
      state.commentMode = Boolean(saved.commentMode);
      state.focusMode = Boolean(saved.focusMode);
      state.syncReady = saved.syncReady !== false;
      state.versionCount = Number.isFinite(saved.versionCount) ? saved.versionCount : 0;
      state.selectedRoomId = saved.selectedRoomId || state.selectedRoomId;
      state.rooms = Array.isArray(saved.rooms) && saved.rooms.length ? saved.rooms : state.rooms;
      state.shares = Array.isArray(saved.shares) ? saved.shares : [];
      state.notes = Array.isArray(saved.notes) ? saved.notes : [];
      if (Array.isArray(saved.chatMessages) && saved.chatMessages.length) {
        state.chatMessages = saved.chatMessages.filter((message) => (
          message.text !== "캔버스 같이 보고 있어요." &&
          message.text !== "음성 채널이 열렸습니다."
        ));
        if (!state.chatMessages.length) {
          state.chatMessages = [
            { id: 1, author: "시스템", text: "방에 들어오면 팀원 접속, 채팅, 통화 상태가 표시됩니다." }
          ];
        }
      }
      state.participants = Array.isArray(saved.participants) ? saved.participants : [];
      applyModalState();
      applyTheme();
      renderRooms();
      renderNotes();
      renderResults();
      renderCollaborationPanel();
      requestAnimationFrame(() => restoreCanvas(saved.canvas));
    };

    bottomModal.addEventListener("click", () => {
      if (!state.modalOpen) {
        setModalOpen(true);
      }
    });

    bottomModalTab.addEventListener("click", (event) => {
      event.stopPropagation();
      setModalOpen(!state.modalOpen);
    });

    themeToggle.addEventListener("click", (event) => {
      event.stopPropagation();
      setDarkMode(!state.darkMode);
    });

    $$(".studio-nav-button").forEach((button) => {
      button.addEventListener("click", () => handleSideAction(button.dataset.action));
    });

    collabPanel.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button || !collabPanel.contains(button)) return;

      if (button.dataset.call === "mic") {
        if (!realtime.localStream) {
          startVoiceCall();
          return;
        }
        state.micMuted = !state.micMuted;
        realtime.localStream.getAudioTracks().forEach((track) => {
          track.enabled = !state.micMuted;
        });
        addTeamMessage(localUser.name, state.micMuted ? "마이크를 껐습니다." : "마이크를 켰습니다.");
        broadcastPresence();
        saveState();
      }

      if (button.dataset.call === "camera") {
        state.cameraOn = !state.cameraOn;
        addTeamMessage(localUser.name, state.cameraOn ? "카메라 상태를 켰습니다." : "카메라 상태를 껐습니다.");
        broadcastPresence();
        saveState();
      }

      if (button.dataset.call === "screen") {
        state.screenSharing = !state.screenSharing;
        addTeamMessage(localUser.name, state.screenSharing ? "화면 공유 상태를 켰습니다." : "화면 공유 상태를 껐습니다.");
        broadcastPresence();
        saveState();
      }

      if (button.dataset.feature === "comment") {
        state.commentMode = !state.commentMode;
        if (state.commentMode) {
          setTool("text", true);
        }
        addTeamMessage(localUser.name, state.commentMode ? "댓글 핀 모드를 켰습니다." : "댓글 핀 모드를 껐습니다.");
        renderCollaborationPanel();
        saveState();
      }

      if (button.dataset.feature === "version") {
        state.versionCount += 1;
        saveState(true);
        addTeamMessage("시스템", `버전 ${state.versionCount} 저장 완료`);
        renderCollaborationPanel();
      }

      if (button.dataset.feature === "focus") {
        state.focusMode = !state.focusMode;
        addTeamMessage(localUser.name, state.focusMode ? "집중 모드를 켰습니다." : "집중 모드를 껐습니다.");
        renderCollaborationPanel();
        saveState();
      }

      if (button.dataset.feature === "sync") {
        state.syncReady = false;
        renderCollaborationPanel();
        setTimeout(() => {
          state.syncReady = true;
          addTeamMessage("시스템", "팀 변경사항 동기화 완료");
          renderCollaborationPanel();
          saveState();
        }, 650);
      }
    });

    chatForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const message = chatInput.value.trim();
      if (!message) return;
      chatInput.value = "";
      addTeamMessage(localUser.name, message, { broadcast: true });
    });

    resultLayer.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button || !resultLayer.contains(button)) return;

      if (button.dataset.resultUpload) {
        resultUpload.click();
        return;
      }

      const share = state.shares.find((item) => String(item.id) === button.dataset.result);
      if (!share) return;

      if (button.dataset.resultAction === "react") {
        share.reactions = (share.reactions || 0) + 1;
        renderResults();
        saveState();
        sendRealtime({
          type: "reaction",
          shareId: share.id,
          reactions: share.reactions
        });
      }

      if (button.dataset.resultAction === "share") {
        showToast("결과물 공유 링크가 준비되었습니다.");
      }
    });

    resultLayer.addEventListener("submit", (event) => {
      const form = event.target.closest(".comment-form");
      if (!form) return;
      event.preventDefault();

      const share = state.shares.find((item) => String(item.id) === form.dataset.resultComment);
      const input = $("input", form);
      const text = input.value.trim();
      if (!share || !text) return;

      share.comments = Array.isArray(share.comments) ? share.comments : [];
      const comment = { id: makeId(), author: localUser.name, text };
      share.comments.push(comment);
      input.value = "";
      renderResults();
      saveState();
      sendRealtime({
        type: "comment",
        shareId: share.id,
        comment
      });
    });

    resultUpload.addEventListener("change", () => {
      const file = resultUpload.files?.[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        const baseName = file.name.replace(/\.[^.]+$/, "") || "업로드 결과물";
        const share = {
          id: Date.now(),
          title: baseName,
          image: reader.result,
          author: localUser.name,
          reactions: 0,
          comments: []
        };
        state.shares.unshift(share);
        sendRealtime({ type: "share", share });
        resultUpload.value = "";
        renderResults();
        saveState(true);
        showToast("결과물 업로드 완료");
      };
      reader.readAsDataURL(file);
    });

    $$(".home-card").forEach((button) => {
      button.addEventListener("click", () => setScreen(button.dataset.homeScreen));
    });

    $$(".nav-hotspots [data-screen]").forEach((button) => {
      button.addEventListener("click", () => setScreen(button.dataset.screen));
    });

    window.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z") {
        const previous = state.undoStack.pop();
        if (previous) {
          restoreCanvas(previous);
          showToast("되돌리기");
        }
      }

      if (event.key === "Enter" && state.screen === "workspace") {
        enterSelectedRoom();
      }

      if (event.key === "Escape" && state.screen === "studio") {
        setScreen("workspace");
      }
    });

    window.addEventListener("resize", fitFrame);

    fitFrame();
    sizePaintCanvas();
    renderStudioControls();
    renderRooms();
    renderCollaborationPanel();
    setTool("brush", true);
    applyCanvasView();
    applyModalState();
    applyTheme();
    loadState();
  </script>
</body>
</html>
