    const callStatus = $("#callStatus");
    const micToggle = $("#micToggle");
    const cameraToggle = $("#cameraToggle");
    const screenToggle = $("#screenToggle");
    const participantList = $("#participantList");
    const chatLog = $("#chatLog");
    const chatForm = $("#chatForm");
    const chatInput = $("#chatInput");

    const state = {
      screen: "home",
      activeTool: "pencil",
      modalOpen: false,
      darkMode: false,
      micMuted: false,
      cameraOn: false,
      screenSharing: false,
      commentMode: false,
      focusMode: false,
      syncReady: true,
      versionCount: 0,
      selectedRoomId: null,
      activeDisqusShareId: null,
      rooms: Array.from({ length: 5 }, (_, index) => ({
        id: index + 1,
        name: DEFAULT_ROOM,
        custom: false
      })),
      shares: [],
      notes: [],
      chatMessages: [
        { id: 1, author: "시스템", text: "같은 주소로 들어오면 이 캔버스에 함께 접속합니다." }
      ],
      participants: [],
      canvasObjects: [],
      selectedObjectId: null,
      dragMode: null,
      dragStart: null,
      dragOrigin: null,
      liveObject: null,
      drawing: false,
      panning: false,
      applyingRemote: false,
      startPoint: null,
      lastPoint: null,
      undoStack: []
    };

    const makeId = () => (crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()));
    const getStoredId = () => {
      const next = makeId();
      try {
        const stored = sessionStorage.getItem("villain-client-id");
        if (stored) return stored;
        sessionStorage.setItem("villain-client-id", next);
      } catch {
        return next;
      }
      return next;
    };
    const localUser = {
      id: getStoredId(),
      name: localStorage.getItem("villain-display-name") || `guest ${Math.floor(100 + Math.random() * 900)}`,
      role: "나"
    };
    localStorage.setItem("villain-display-name", localUser.name);

    const canvasView = {
      scale: 1,
      x: 0,
      y: 0,
      panStart: null
    };

    const realtime = {
      socket: null,
      roomKey: null,
      connected: false,
      reconnectTimer: null,
      participants: new Map(),
      peers: new Map(),
      localStream: null,
      remoteAudio: new Map()
    };

    const fitFrame = () => {
      const scale = Math.min(window.innerWidth / DESIGN.width, window.innerHeight / DESIGN.height);
      frame.style.setProperty("--scale", String(scale));
    };

    const showToast = (message) => {
      toast.textContent = message;
      statusText.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1600);
    };

    const screenMap = {
      home: $("#homeScreen"),
      workspace: $("#workspaceScreen"),
      result: $("#resultScreen"),
      studio: $("#studioScreen")
    };

    const setScreen = (screen) => {
      state.screen = screen;
      Object.entries(screenMap).forEach(([name, element]) => {
        element.classList.toggle("active", name === screen);
      });
      frame.classList.toggle("is-studio", screen === "studio");
      if (screen === "studio" || screen === "result") {
        connectRealtime();
      }
      if (screen === "workspace") {
        connectRealtime();
      }
      if (screen === "studio") {
        loadRoomState();
        requestAnimationFrame(sizePaintCanvas);
        renderCollaborationPanel();
      }
      saveState();
    };

    const sizePaintCanvas = () => {
      const previous = paintCanvas.width ? paintCanvas.toDataURL("image/png") : null;
      const dpr = window.devicePixelRatio || 1;
      paintCanvas.width = Math.round(PAINT.width * dpr);
      paintCanvas.height = Math.round(PAINT.height * dpr);
      paintCanvas.style.width = `${PAINT.width}px`;
      paintCanvas.style.height = `${PAINT.height}px`;
      paintCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      paintCtx.lineCap = "round";
      paintCtx.lineJoin = "round";

      if (state.canvasObjects.length) {
        renderCanvasObjects();
      } else if (previous) {
        const image = new Image();
        image.onload = () => {
          paintCtx.clearRect(0, 0, PAINT.width, PAINT.height);
          paintCtx.drawImage(image, 0, 0, PAINT.width, PAINT.height);
        };
        image.src = previous;
      }
    };

    const applyCanvasView = () => {
      const transform = `translate(${canvasView.x}px, ${canvasView.y}px) scale(${canvasView.scale})`;
      paintCanvas.style.transform = transform;
      noteLayer.style.transform = transform;
    };

    const zoomCanvasAt = (event, factor) => {
      const oldScale = canvasView.scale;
      const nextScale = Math.max(0.35, Math.min(4, oldScale * factor));
      if (Math.abs(nextScale - oldScale) < 0.001) return;

      const frameRect = frame.getBoundingClientRect();
      const scale = getFrameScale();
      const localX = (event.clientX - frameRect.left) / scale;
      const localY = (event.clientY - frameRect.top) / scale;
      const paintPoint = toPaintPoint(event);

      canvasView.scale = nextScale;
      canvasView.x = localX - PAINT.x - paintPoint.x * nextScale;
      canvasView.y = localY - PAINT.y - paintPoint.y * nextScale;
      applyCanvasView();
      renderCollaborationPanel();
      showToast(`확대 ${Math.round(nextScale * 100)}%`);
    };

    const resetCanvasView = () => {
      canvasView.scale = 1;
      canvasView.x = 0;
      canvasView.y = 0;
      applyCanvasView();
      renderCollaborationPanel();
      showToast("캔버스 보기 초기화");
    };

    const toPaintPoint = (event) => {
      const rect = paintCanvas.getBoundingClientRect();
      return {
        x: Math.max(0, Math.min(PAINT.width, (event.clientX - rect.left) * (PAINT.width / rect.width))),
        y: Math.max(0, Math.min(PAINT.height, (event.clientY - rect.top) * (PAINT.height / rect.height)))
      };
    };

    const pushUndo = () => {
      state.undoStack.push(exportDrawingData());
      if (state.undoStack.length > 20) {
        state.undoStack.shift();
      }
    };

    const restoreCanvas = (dataUrl) => {
      if (!dataUrl) {
        paintCtx.clearRect(0, 0, PAINT.width, PAINT.height);
        return;
      }
      const image = new Image();
      image.onload = () => {
        paintCtx.clearRect(0, 0, PAINT.width, PAINT.height);
        paintCtx.drawImage(image, 0, 0, PAINT.width, PAINT.height);
      };
      image.src = dataUrl;
    };

    const exportDrawingData = () => ({
      objects: state.canvasObjects.map((object) => JSON.parse(JSON.stringify(object)))
    });

    const importDrawingData = (drawingData) => {
      const objects = Array.isArray(drawingData?.objects) ? drawingData.objects : [];
      state.canvasObjects = objects
        .filter((object) => object && object.id && ["stroke", "rect"].includes(object.type))
        .map((object) => JSON.parse(JSON.stringify(object)));
      if (!state.canvasObjects.some((object) => object.id === state.selectedObjectId)) {
        state.selectedObjectId = null;
      }
      renderCanvasObjects();
    };

    const selectedCanvasObject = () => (
      state.canvasObjects.find((object) => object.id === state.selectedObjectId) || null
    );

    const objectBounds = (object) => {
      if (!object) return null;
      if (object.type === "rect") {
        return {
          x: Math.min(object.x, object.x + object.width),
          y: Math.min(object.y, object.y + object.height),
          width: Math.abs(object.width),
          height: Math.abs(object.height)
        };
      }
      const points = Array.isArray(object.points) ? object.points : [];
      if (!points.length) return null;
      const xs = points.map((point) => point.x);
      const ys = points.map((point) => point.y);
      const x = Math.min(...xs);
      const y = Math.min(...ys);
      return {
        x,
        y,
        width: Math.max(...xs) - x,
        height: Math.max(...ys) - y
      };
    };

    const normalizeRectObject = (object) => {
      if (!object || object.type !== "rect") return object;
      const bounds = objectBounds(object);
      object.x = bounds.x;
      object.y = bounds.y;
      object.width = bounds.width;
      object.height = bounds.height;
      return object;
    };

    const pointInBounds = (point, bounds, padding = 0) => (
      bounds &&
      point.x >= bounds.x - padding &&
      point.x <= bounds.x + bounds.width + padding &&
      point.y >= bounds.y - padding &&
      point.y <= bounds.y + bounds.height + padding
    );

    const distanceToSegment = (point, a, b) => {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      if (dx === 0 && dy === 0) {
        return Math.hypot(point.x - a.x, point.y - a.y);
      }
      const t = Math.max(0, Math.min(1, ((point.x - a.x) * dx + (point.y - a.y) * dy) / (dx * dx + dy * dy)));
      return Math.hypot(point.x - (a.x + dx * t), point.y - (a.y + dy * t));
    };

    const pointNearStroke = (point, object, padding = 18) => {
      const points = Array.isArray(object.points) ? object.points : [];
      for (let index = 1; index < points.length; index += 1) {
        if (distanceToSegment(point, points[index - 1], points[index]) <= padding) {
          return true;
        }
      }
      return points.some((strokePoint) => Math.hypot(point.x - strokePoint.x, point.y - strokePoint.y) <= padding);
    };

    const hitCanvasObject = (point, options = {}) => {
      for (let index = state.canvasObjects.length - 1; index >= 0; index -= 1) {
        const object = state.canvasObjects[index];
        if (object.type === "rect" && pointInBounds(point, objectBounds(object), 10)) {
          return object;
        }
        if (options.includeStrokes && object.type === "stroke" && pointNearStroke(point, object)) {
          return object;
        }
      }
      return null;
    };

    const resizeHandleBounds = (object) => {
      const bounds = objectBounds(object);
      if (!bounds || object.type !== "rect") return null;
      return {
        x: bounds.x + bounds.width - 12,
        y: bounds.y + bounds.height - 12,
        width: 24,
        height: 24
      };
    };

    const drawCanvasObject = (object) => {
      paintCtx.save();
      paintCtx.strokeStyle = "#111";
      paintCtx.lineCap = "round";
      paintCtx.lineJoin = "round";

      if (object.type === "stroke") {
        const points = Array.isArray(object.points) ? object.points : [];
        if (points.length) {
          paintCtx.lineWidth = object.width || 7;
          paintCtx.beginPath();
          paintCtx.moveTo(points[0].x, points[0].y);
          points.slice(1).forEach((point) => paintCtx.lineTo(point.x, point.y));
          paintCtx.stroke();
        }
      }

      if (object.type === "rect") {
        const bounds = objectBounds(object);
        if (bounds) {
          paintCtx.lineWidth = 5;
          paintCtx.strokeRect(bounds.x, bounds.y, bounds.width, bounds.height);
        }
      }

      paintCtx.restore();
    };

    const drawSelection = () => {
      const object = selectedCanvasObject();
      const bounds = objectBounds(object);
      if (!object || object.type !== "rect" || !bounds) return;

      paintCtx.save();
      paintCtx.strokeStyle = "#326bff";
      paintCtx.fillStyle = "#326bff";
      paintCtx.lineWidth = 2;
      paintCtx.setLineDash([9, 6]);
      paintCtx.strokeRect(bounds.x - 6, bounds.y - 6, bounds.width + 12, bounds.height + 12);
      paintCtx.setLineDash([]);
      const handle = resizeHandleBounds(object);
      if (handle) {
        paintCtx.fillRect(handle.x, handle.y, handle.width, handle.height);
      }
      paintCtx.restore();
    };

    const renderCanvasObjects = () => {
      paintCtx.clearRect(0, 0, PAINT.width, PAINT.height);
      paintCtx.save();
      paintCtx.fillStyle = "#fffefa";
      paintCtx.fillRect(0, 0, PAINT.width, PAINT.height);
      paintCtx.restore();
      state.canvasObjects.forEach(drawCanvasObject);
      drawSelection();
    };

    const upsertCanvasObject = (object) => {
      const next = JSON.parse(JSON.stringify(object));
      const index = state.canvasObjects.findIndex((item) => item.id === next.id);
      if (index >= 0) {
        state.canvasObjects[index] = next;
      } else {
        state.canvasObjects.push(next);
      }
      renderCanvasObjects();
    };

    const removeCanvasObject = (objectId) => {
      const before = state.canvasObjects.length;
      state.canvasObjects = state.canvasObjects.filter((object) => object.id !== objectId);
      if (state.selectedObjectId === objectId) {
        state.selectedObjectId = null;
      }
      if (state.canvasObjects.length !== before) {
        renderCanvasObjects();
      }
    };

    const eraseCanvasObjectAt = (point) => {
      const target = hitCanvasObject(point, { includeStrokes: true });
      if (!target) return false;
      removeCanvasObject(target.id);
      sendCanvasOperation({ kind: "object-remove", objectId: target.id });
      return true;
    };

    const drawSegment = (from, to, tool = state.activeTool) => {
      paintCtx.save();
      if (tool === "eraser") {
        paintCtx.globalCompositeOperation = "destination-out";
        paintCtx.lineWidth = 36;
      } else {
        paintCtx.globalCompositeOperation = "source-over";
        paintCtx.strokeStyle = "#000";
        paintCtx.lineWidth = tool === "line" || tool === "lasso" ? 7 : 8;
        if (tool === "lasso") {
          paintCtx.setLineDash([18, 12]);
        }
      }
      paintCtx.beginPath();
      paintCtx.moveTo(from.x, from.y);
      paintCtx.lineTo(to.x, to.y);
      paintCtx.stroke();
      paintCtx.restore();
    };

    const drawRoughEllipse = (start, end) => {
      const x = Math.min(start.x, end.x);
      const y = Math.min(start.y, end.y);
      const width = Math.abs(end.x - start.x);
      const height = Math.abs(end.y - start.y);
      if (width < 10 || height < 10) return;

      paintCtx.save();
      paintCtx.strokeStyle = "#000";
      paintCtx.lineWidth = 6;
      for (let i = 0; i < 3; i += 1) {
        paintCtx.beginPath();
        paintCtx.ellipse(x + width / 2 + i - 1, y + height / 2 - i, width / 2, height / 2, 0, 0, Math.PI * 2);
        paintCtx.stroke();
      }
      paintCtx.restore();
    };

    const drawRoughRect = (start, end) => {
      const x = Math.min(start.x, end.x);
      const y = Math.min(start.y, end.y);
      const width = Math.abs(end.x - start.x);
      const height = Math.abs(end.y - start.y);
      if (width < 10 || height < 10) return;

      paintCtx.save();
      paintCtx.strokeStyle = "#000";
      paintCtx.lineWidth = 6;
      for (let i = 0; i < 3; i += 1) {
        paintCtx.strokeRect(x + i * 2 - 2, y - i + 2, width + i, height - i);
      }
      paintCtx.restore();
    };

    const drawTriangle = (start, end) => {
      const x = Math.min(start.x, end.x);
      const y = Math.min(start.y, end.y);
      const width = Math.abs(end.x - start.x);
      const height = Math.abs(end.y - start.y);
      if (width < 12 || height < 12) return;

      paintCtx.save();
      paintCtx.strokeStyle = "#000";
      paintCtx.lineWidth = 7;
      paintCtx.beginPath();
      paintCtx.moveTo(x + width / 2, y);
      paintCtx.lineTo(x + width, y + height);
      paintCtx.lineTo(x, y + height);
      paintCtx.closePath();
      paintCtx.stroke();
      paintCtx.restore();
    };

    const drawStamp = (point, tool) => {
      paintCtx.save();
      paintCtx.strokeStyle = "#000";
      paintCtx.fillStyle = "#000";
      paintCtx.lineWidth = 7;

      if (tool === "spark") {
        for (let i = 0; i < 10; i += 1) {
          const angle = (Math.PI * 2 * i) / 10;
          paintCtx.beginPath();
          paintCtx.moveTo(point.x, point.y);
          paintCtx.lineTo(point.x + Math.cos(angle) * 54, point.y + Math.sin(angle) * 54);
          paintCtx.stroke();
        }
      }

      if (tool === "fill") {
        paintCtx.globalAlpha = 0.16;
        paintCtx.fillRect(Math.max(0, point.x - 120), Math.max(0, point.y - 80), 240, 160);
        paintCtx.globalAlpha = 1;
        paintCtx.strokeRect(Math.max(0, point.x - 120), Math.max(0, point.y - 80), 240, 160);
      }

      if (tool === "pattern") {
        for (let x = point.x - 72; x <= point.x + 72; x += 18) {
          for (let y = point.y - 72; y <= point.y + 72; y += 18) {
            paintCtx.fillRect(x, y, 8, 8);
          }
        }
      }

      if (tool === "stamp") {
        paintCtx.beginPath();
        paintCtx.arc(point.x, point.y - 28, 24, 0, Math.PI * 2);
        paintCtx.stroke();
        paintCtx.strokeRect(point.x - 42, point.y + 4, 84, 52);
        paintCtx.beginPath();
        paintCtx.moveTo(point.x - 58, point.y + 62);
        paintCtx.lineTo(point.x + 58, point.y + 62);
        paintCtx.stroke();
      }

      if (tool === "drop") {
        paintCtx.beginPath();
        paintCtx.moveTo(point.x, point.y - 58);
        paintCtx.bezierCurveTo(point.x + 42, point.y - 6, point.x + 32, point.y + 54, point.x, point.y + 64);
        paintCtx.bezierCurveTo(point.x - 32, point.y + 54, point.x - 42, point.y - 6, point.x, point.y - 58);
        paintCtx.stroke();
      }

      paintCtx.restore();
    };

    const stampAt = (point, tool) => {
      pushUndo();
      drawStamp(point, tool);
      sendCanvasOperation({ kind: "stamp", point, tool });
      broadcastRoomState(true);
    };

    const applyCanvasOperation = (operation) => {
      if (!operation) return;
      state.applyingRemote = true;

      if (operation.kind === "object-upsert" && operation.object) {
        upsertCanvasObject(operation.object);
        state.applyingRemote = false;
        saveRoomState(true);
        return;
      }

      if (operation.kind === "object-remove" && operation.objectId) {
        removeCanvasObject(operation.objectId);
        state.applyingRemote = false;
        saveRoomState(true);
        return;
      }

      if (operation.kind === "objects" && Array.isArray(operation.objects)) {
        importDrawingData({ objects: operation.objects });
        state.applyingRemote = false;
        saveRoomState(true);
        return;
      }

      if (operation.kind === "segment") {
        drawSegment(operation.from, operation.to, operation.tool);
      }
      if (operation.kind === "shape") {
        drawRoughEllipse(operation.start, operation.end);
      }
      if (operation.kind === "triangle") {
        drawTriangle(operation.start, operation.end);
      }
      if (operation.kind === "line" || operation.kind === "arrow") {
        drawSegment(operation.start, operation.end, operation.tool);
        if (operation.kind === "arrow") {
          drawArrowHead(operation.start, operation.end);
        }
      }
      if (operation.kind === "stamp") {
        drawStamp(operation.point, operation.tool);
      }

      state.applyingRemote = false;
      saveRoomState(true);
    };

    const sendCanvasOperation = (operation) => {
      if (state.applyingRemote || state.screen !== "studio") return;
      sendRealtime({
        type: "canvas-op",
        dataRoom: currentRoomKey(),
        sourceId: localUser.id,
        operation: {
          ...operation,
          id: makeId(),
          at: Date.now()
        }
      });
    };

    const setShapePreview = (start, end) => {
      const x = Math.min(start.x, end.x);
      const y = Math.min(start.y, end.y);
      const width = Math.abs(end.x - start.x);
      const height = Math.abs(end.y - start.y);
      Object.assign(shapePreview.style, {
        display: "block",
        left: `${PAINT.x + canvasView.x + x * canvasView.scale}px`,
        top: `${PAINT.y + canvasView.y + y * canvasView.scale}px`,
        width: `${width * canvasView.scale}px`,
        height: `${height * canvasView.scale}px`
      });
    };

    const applyModalState = () => {
      bottomModal.classList.toggle("is-open", state.modalOpen);
      bottomModal.setAttribute("aria-expanded", String(state.modalOpen));
      bottomModalTab.setAttribute("aria-expanded", String(state.modalOpen));
    };

    const setModalOpen = (open) => {
      state.modalOpen = open;
      applyModalState();
      saveState();
    };

    const applyTheme = () => {
      document.body.classList.toggle("dark-mode", state.darkMode);
      themeToggle.setAttribute("aria-pressed", String(state.darkMode));
      themeToggleState.textContent = state.darkMode ? "켜짐" : "꺼짐";
    };

    const setDarkMode = (enabled) => {
      state.darkMode = enabled;
      applyTheme();
      saveState();
    };

    const currentRoomName = () => {
      const room = state.rooms.find((item) => item.id === state.selectedRoomId);
      return room?.name || (state.selectedRoomId ? `${state.selectedRoomId}의 과제방` : DEFAULT_ROOM);
    };

    const currentRoomKey = () => {
      const room = state.rooms.find((item) => item.id === state.selectedRoomId);
      return String(room?.id || state.selectedRoomId || "lobby");
    };

    const currentRealtimeKey = () => (
      state.screen === "studio" || state.screen === "result" ? currentRoomKey() : "lobby"
    );

    const getFrameScale = () => Number(getComputedStyle(frame).getPropertyValue("--scale")) || 1;

    const updateLocalParticipant = () => {
      const participant = {
        ...localUser,
        micMuted: state.micMuted,
        cameraOn: state.cameraOn,
        screenSharing: state.screenSharing,
        calling: Boolean(realtime.localStream),
        self: true,
        updatedAt: Date.now()
      };
      realtime.participants.set(localUser.id, participant);
      state.participants = [...realtime.participants.values()];
      return participant;
    };

    const visibleParticipants = () => {
      updateLocalParticipant();
      return [...realtime.participants.values()].sort((a, b) => {
        if (a.id === localUser.id) return -1;
        if (b.id === localUser.id) return 1;
        return (a.name || "").localeCompare(b.name || "");
      });
    };

    const sendRealtime = (payload) => {
      if (!realtime.connected || realtime.socket?.readyState !== WebSocket.OPEN) return false;
      realtime.socket.send(JSON.stringify({
        ...payload,
        room: currentRealtimeKey(),
        user: updateLocalParticipant()
      }));
      return true;
    };

    const broadcastPresence = () => {
      updateLocalParticipant();
      sendRealtime({ type: "presence" });
      renderCollaborationPanel();
    };

    const syncRooms = () => {
      if (currentRealtimeKey() !== "lobby") return;
      sendRealtime({
        type: "rooms-state",
        rooms: state.rooms
      });
    };

    const connectRealtime = () => {
      if (location.protocol === "file:") {
        realtime.connected = false;
        updateLocalParticipant();
        renderCollaborationPanel();
        return;
      }

      const roomKey = currentRealtimeKey();
      if (realtime.connected && realtime.roomKey === roomKey) return;
      if (realtime.socket) {
        realtime.socket.close();
      }

      const realtimeBase = window.VILLAIN_REALTIME_BASE || "";
      const base = realtimeBase ? new URL(realtimeBase, location.href) : location;
      const scheme = base.protocol === "https:" ? "wss:" : "ws:";
      const prefix = realtimeBase ? base.pathname.replace(/\/$/, "") : "";
      const url = `${scheme}//${base.host}${prefix}/api/room/${encodeURIComponent(roomKey)}/ws`;
      realtime.roomKey = roomKey;
      realtime.socket = new WebSocket(url);

      realtime.socket.addEventListener("open", () => {
        realtime.connected = true;
        realtime.participants.clear();
        updateLocalParticipant();
        sendRealtime({ type: "join" });
        renderCollaborationPanel();
        showToast("실시간 작업공간 연결 완료");
      });

      realtime.socket.addEventListener("message", (event) => {
        try {
          handleRealtimeMessage(JSON.parse(event.data));
        } catch {
          showToast("실시간 메시지를 읽지 못했습니다.");
        }
      });

      realtime.socket.addEventListener("close", () => {
        realtime.connected = false;
        realtime.participants.clear();
        updateLocalParticipant();
        renderCollaborationPanel();
        clearTimeout(realtime.reconnectTimer);
        if (["workspace", "studio", "result"].includes(state.screen)) {
          realtime.reconnectTimer = setTimeout(connectRealtime, 1600);
        }
      });
    };

    const handleRealtimeMessage = async (message) => {
      if (!message) return;
      if (message.type !== "init" && message.room !== currentRealtimeKey()) return;
      if (message.type === "init" && message.room && message.room !== currentRealtimeKey()) return;

      if (Array.isArray(message.participants)) {
        realtime.participants.clear();
        message.participants.forEach((participant) => realtime.participants.set(participant.id, participant));
        updateLocalParticipant();
        renderCollaborationPanel();
      }

      if (message.type === "init") {
        if (Array.isArray(message.messages) && message.messages.length) {
          state.chatMessages = message.messages;
        }
        if (Array.isArray(message.shares)) {
          state.shares = message.shares;
        }
        if (currentRealtimeKey() === "lobby") {
          if (Array.isArray(message.rooms) && message.rooms.length) {
            state.rooms = message.rooms;
            if (!state.rooms.some((room) => room.id === state.selectedRoomId)) {
              state.selectedRoomId = state.rooms[0]?.id || null;
            }
            renderRooms();
          } else {
            syncRooms();
          }
        }
        if (currentRealtimeKey() === currentRoomKey() && message.drawingData) {
          state.applyingRemote = true;
          importDrawingData(message.drawingData);
          state.applyingRemote = false;
        } else if (currentRealtimeKey() === currentRoomKey() && message.canvas) {
          state.applyingRemote = true;
          restoreCanvas(message.canvas);
          state.applyingRemote = false;
        }
        if (currentRealtimeKey() === currentRoomKey() && Array.isArray(message.notes)) {
          state.notes = message.notes;
          renderNotes();
        }
        if (currentRealtimeKey() === currentRoomKey() && (message.drawingData || message.canvas || Array.isArray(message.notes))) {
          storeIncomingRoomState(message.canvas, state.notes, message.drawingData);
        }
        renderCollaborationPanel();
        renderResults();
        saveState();
      }

      if (message.type === "chat" && message.message) {
        addTeamMessage(message.message.author, message.message.text, {
          id: message.message.id,
          broadcast: false
        });
      }

      if (message.type === "share" && message.share && !state.shares.some((item) => String(item.id) === String(message.share.id))) {
        state.shares.unshift(message.share);
        renderResults();
        saveState(true);
      }

      if (message.type === "comment") {
        const share = state.shares.find((item) => String(item.id) === String(message.shareId));
        if (share) {
          share.comments = Array.isArray(share.comments) ? share.comments : [];
          if (!share.comments.some((item) => item.id === message.comment?.id)) {
            share.comments.push(message.comment);
          }
          if (String(share.id) === String(state.activeDisqusShareId)) {
            refreshShareSummary(share);
          } else {
            renderResults();
          }
          saveState();
        }
      }

      if (message.type === "reaction") {
        const share = state.shares.find((item) => String(item.id) === String(message.shareId));
        if (share) {
          share.reactions = Math.max(share.reactions || 0, message.reactions || 0);
          if (String(share.id) === String(state.activeDisqusShareId)) {
            refreshShareSummary(share);
          } else {
            renderResults();
          }
          saveState();
        }
      }

      if (message.type === "rooms-state" && Array.isArray(message.rooms) && currentRealtimeKey() === "lobby") {
        state.rooms = message.rooms;
        if (!state.rooms.some((room) => room.id === state.selectedRoomId)) {
          state.selectedRoomId = state.rooms[0]?.id || null;
        }
        renderRooms();
        saveState();
      }

      if (message.type === "canvas-op" && message.sourceId !== localUser.id && message.dataRoom === currentRoomKey()) {
        applyCanvasOperation(message.operation);
      }

      if (message.type === "canvas-state" && message.sourceId !== localUser.id && message.dataRoom === currentRoomKey()) {
        state.applyingRemote = true;
        if (message.drawingData) {
          importDrawingData(message.drawingData);
        } else if (message.canvas) {
          restoreCanvas(message.canvas);
        }
        if (Array.isArray(message.notes)) {
          state.notes = message.notes;
          renderNotes();
        }
        state.applyingRemote = false;
        storeIncomingRoomState(message.canvas, state.notes, message.drawingData);
      }

      if (message.type === "signal" && message.to === localUser.id) {
        await handleSignal(message.from, message.signal);
      }
    };

    const trimChatMessages = () => {
      state.chatMessages = state.chatMessages.slice(-80);
    };

    const addTeamMessage = (author, text, options = {}) => {
      const id = options.id || makeId();
      if (state.chatMessages.some((message) => message.id === id)) return;
      const message = {
        id,
        author,
        text,
        createdAt: Date.now()
      };
      state.chatMessages.push(message);
      trimChatMessages();
      renderCollaborationPanel();
      saveState();
      if (options.broadcast) {
        sendRealtime({ type: "chat", message });
      }
    };

    const ensureLocalStream = async () => {
      if (realtime.localStream) return realtime.localStream;
      if (!navigator.mediaDevices?.getUserMedia) {
        showToast("이 브라우저에서 통화를 지원하지 않습니다.");
        throw new Error("media devices unsupported");
      }
      realtime.localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      realtime.localStream.getAudioTracks().forEach((track) => {
        track.enabled = !state.micMuted;
      });
      broadcastPresence();
      return realtime.localStream;
    };

    const ensurePeer = async (peerId) => {
      if (realtime.peers.has(peerId)) return realtime.peers.get(peerId);
      const peer = new RTCPeerConnection({
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
      });
      realtime.peers.set(peerId, peer);

      peer.onicecandidate = (event) => {
        if (event.candidate) {
          sendRealtime({
            type: "signal",
            to: peerId,
            from: localUser.id,
            signal: { candidate: event.candidate }
          });
        }
      };

      peer.ontrack = (event) => {
        let audio = realtime.remoteAudio.get(peerId);
        if (!audio) {
          audio = document.createElement("audio");
          audio.autoplay = true;
          audio.playsInline = true;
          audio.dataset.peer = peerId;
          document.body.appendChild(audio);
          realtime.remoteAudio.set(peerId, audio);
        }
        audio.srcObject = event.streams[0];
      };

      if (realtime.localStream) {
        realtime.localStream.getTracks().forEach((track) => peer.addTrack(track, realtime.localStream));
      }
      return peer;
    };

    const callParticipant = async (peerId) => {
      if (peerId === localUser.id) return;
      const stream = await ensureLocalStream();
      const peer = await ensurePeer(peerId);
      stream.getTracks().forEach((track) => {
        if (!peer.getSenders().some((sender) => sender.track === track)) {
          peer.addTrack(track, stream);
        }
      });
      const offer = await peer.createOffer();
      await peer.setLocalDescription(offer);
      sendRealtime({
        type: "signal",
        to: peerId,
        from: localUser.id,
        signal: peer.localDescription
      });
    };

    const startVoiceCall = async () => {
      try {
        await ensureLocalStream();
        state.micMuted = false;
        realtime.localStream.getAudioTracks().forEach((track) => {
          track.enabled = true;
        });
        broadcastPresence();
        visibleParticipants()
          .filter((participant) => participant.id !== localUser.id)
          .forEach((participant) => callParticipant(participant.id));
        addTeamMessage("시스템", "음성 통화를 연결했습니다.");
      } catch {
        showToast("마이크 권한이 필요합니다.");
      }
    };

    const handleSignal = async (peerId, signal) => {
      if (!peerId || !signal) return;
      const peer = await ensurePeer(peerId);

      if (signal.type === "offer") {
        await ensureLocalStream();
        realtime.localStream.getTracks().forEach((track) => {
          if (!peer.getSenders().some((sender) => sender.track === track)) {
            peer.addTrack(track, realtime.localStream);
          }
        });
        await peer.setRemoteDescription(new RTCSessionDescription(signal));
        const answer = await peer.createAnswer();
        await peer.setLocalDescription(answer);
        sendRealtime({
          type: "signal",
          to: peerId,
          from: localUser.id,
          signal: peer.localDescription
        });
        return;
      }

      if (signal.type === "answer") {
        await peer.setRemoteDescription(new RTCSessionDescription(signal));
        return;
      }

      if (signal.candidate) {
        await peer.addIceCandidate(new RTCIceCandidate(signal.candidate));
      }
    };

    const applyCollabMode = () => {
      frame.classList.toggle("focus-mode", state.focusMode);
    };

    const renderCollaborationPanel = () => {
      const participants = visibleParticipants();
      studioRoomTitle.textContent = currentRoomName();
      studioRoomStatus.textContent = realtime.connected
        ? `실시간 협업 중 · ${Math.round(canvasView.scale * 100)}%`
        : "사이트 주소로 입장하면 같은 방에 연결됩니다";
      callStatus.textContent = realtime.connected
        ? `${participants.length}명 접속 · 자동 동기화`
        : "연결 대기";

      participantList.innerHTML = "";
      participants.forEach((member) => {
        const button = document.createElement("button");
        button.className = "participant-row";
        button.type = "button";
        button.disabled = true;

        const dot = document.createElement("span");
        dot.className = "presence-dot";
        dot.setAttribute("aria-hidden", "true");

        const name = document.createElement("span");
        name.textContent = `${member.name}${member.id === localUser.id ? " · 나" : ""}`;

        const status = document.createElement("span");
        status.className = "participant-state";
        status.textContent = "접속";

        button.append(dot, name, status);
        participantList.appendChild(button);
      });

      chatLog.innerHTML = "";
      state.chatMessages.slice(-24).forEach((message) => {
        const line = document.createElement("div");
        line.className = "chat-line";
        const author = document.createElement("strong");
        author.textContent = message.author;
        const text = document.createElement("span");
        text.textContent = message.text;
        line.append(author, text);
        chatLog.appendChild(line);
      });
      requestAnimationFrame(() => {
        chatLog.scrollTop = chatLog.scrollHeight;
      });

      applyCollabMode();
    };

    const createNote = (point, text = "메모") => {
      const note = {
        id: makeId(),
        x: Math.max(0, Math.min(point.x, PAINT.width - 210)),
        y: Math.max(0, Math.min(point.y, PAINT.height - 90)),
        text
      };
      state.notes.push(note);
      renderNotes();
      broadcastRoomState(false);
      return note;
    };

    const renderNotes = () => {
      noteLayer.innerHTML = state.notes.map((note) => `
        <div class="note-card" contenteditable="true" spellcheck="false" data-note="${note.id}" style="left:${note.x}px;top:${note.y}px">${note.text}</div>
      `).join("");

      $$(".note-card", noteLayer).forEach((element) => {
        element.addEventListener("input", () => {
          const note = state.notes.find((item) => item.id === element.dataset.note);
          if (note) {
            note.text = element.textContent.trim() || "메모";
            broadcastRoomState(false);
          }
        });
        element.addEventListener("pointerdown", (event) => event.stopPropagation());
      });
    };

    const renderRooms = () => {
      const keyword = roomSearch.value.trim().toLowerCase();
      const visibleRooms = state.rooms.filter((room) => room.name.toLowerCase().includes(keyword));
      roomRows.innerHTML = "";

      visibleRooms.forEach((room, index) => {
        const button = document.createElement("button");
        button.className = `room-card${room.id === state.selectedRoomId ? " is-selected" : ""}`;
        button.type = "button";
        button.dataset.room = String(room.id);

        const name = document.createElement("span");
        name.className = "room-card-name";
        name.textContent = room.name;

        const meta = document.createElement("span");
        meta.className = "room-card-meta";
        meta.textContent = "주소 공유로 실시간 협업";

        button.append(name, meta);
        button.addEventListener("click", () => {
          state.selectedRoomId = room.id;
          renderRooms();
          saveState();
          showToast("방 선택됨. 한 번 더 누르면 입장합니다.");
        });
        button.addEventListener("dblclick", () => enterSelectedRoom(room.id));
        roomRows.appendChild(button);
      });
    };

    const renderRoomSelection = () => {
      renderRooms();
    };

    const enterSelectedRoom = (roomId = state.selectedRoomId) => {
      if (!roomId) {
        showToast("먼저 방을 선택해 주세요.");
        return;
      }
      state.selectedRoomId = roomId;
      setScreen("studio");
      updateRoomRoute();
      showToast("작업공간 입장");
    };

    $("#createRoom").addEventListener("click", () => {
      const nextNumber = String(state.rooms.length + 1).padStart(3, "0");
      const room = {
        id: Date.now(),
        name: `${nextNumber}의 과제방`,
        custom: true
      };
      state.rooms.unshift(room);
      state.selectedRoomId = room.id;
      roomSearch.value = "";
      renderRooms();
      roomRows.scrollTop = 0;
      saveState();
      syncRooms();
      showToast("새 방 생성. 방 줄을 더블클릭하면 입장합니다.");
    });

    $("#deleteRoom").addEventListener("click", () => {
      if (!state.selectedRoomId) {
        showToast("삭제할 방을 먼저 선택하세요.");
        return;
      }
      state.rooms = state.rooms.filter((room) => room.id !== state.selectedRoomId);
      state.selectedRoomId = state.rooms[0]?.id || null;
      renderRooms();
      saveState();
      syncRooms();
      showToast("방 삭제 완료");
    });

    roomSearch.addEventListener("input", renderRooms);

    const toolButtons = [
      ["select", 0, 0],
      ["pencil", 0, 1],
      ["shape", 0, 2],
      ["eraser", 0, 3],
      ["zoom", 0, 4]
    ];

    const setTool = (tool, silent = false) => {
      state.activeTool = tool;
      toolCursor.classList.remove("show");
      $$(".tool-hot", studioControls).forEach((button) => {
        button.classList.toggle("is-active", button.dataset.tool === tool);
      });
      if (tool === "zoom") {
        paintCanvas.style.cursor = "zoom-in";
      } else if (tool === "select") {
        paintCanvas.style.cursor = "default";
      } else {
        paintCanvas.style.cursor = ["pencil", "eraser", "shape"].includes(tool) ? "crosshair" : "default";
      }
      if (!silent) {
        showToast(`${toolLabel(tool)} 선택`);
      }
    };

    const toolLabel = (tool) => ({
      select: "선택",
      pencil: "연필",
      shape: "도형",
      zoom: "줌",
      eraser: "지우개"
    }[tool] || tool);

    const renderStudioControls = () => {
      studioControls.innerHTML = "";
      toolButtons.forEach(([tool, col, row]) => {
        const button = document.createElement("button");
        button.className = "hotspot tool-hot";
        button.type = "button";
        button.dataset.tool = tool;
        button.dataset.col = String(col);
        button.dataset.row = String(row);
        button.textContent = toolLabel(tool);
        button.addEventListener("click", () => {
          setTool(tool);
        });
        studioControls.appendChild(button);
      });
    };

    const handleSideAction = async (action) => {
      if (action === "leave") {
        setScreen("workspace");
        clearRoomRoute();
        showToast("작업공간 목록으로 이동");
      }
      if (action === "link") {
        await copyRoomLink();
      }
      if (action === "save") {
        broadcastRoomState(true);
        saveState();
        showToast("현재 작업 저장 완료");
      }
      if (action === "share") {
        const image = await composeStudioImage();
        const share = {
          id: Date.now(),
          title: `결과물 ${String(state.shares.length + 1).padStart(2, "0")}`,
          image,
          author: currentRoomName(),
          roomKey: currentRoomKey(),
          reactions: 0,
          comments: []
        };
        share.disqusIdentifier = getShareIdentifier(share);
        state.shares.unshift(share);
        sendRealtime({ type: "share", share });
        renderResults();
        setScreen("result");
        saveState(true);
        showToast("결과물 탭에 공유 완료");
      }
      if (action === "export") {
        const link = document.createElement("a");
        link.href = await composeStudioImage();
        link.download = "villain-work.png";
        link.click();
        showToast("PNG 내보내기 완료");
      }
    };

    paintCanvas.addEventListener("pointerdown", (event) => {
      if (state.screen !== "studio") return;
      const point = toPaintPoint(event);

      if (state.activeTool === "zoom") {
        zoomCanvasAt(event, event.shiftKey || event.altKey ? 0.82 : 1.18);
        return;
      }

      if (state.activeTool === "select") {
        const selected = selectedCanvasObject();
        const handle = selected ? resizeHandleBounds(selected) : null;
        const target = handle && pointInBounds(point, handle, 8)
          ? selected
          : hitCanvasObject(point);

        state.selectedObjectId = target?.type === "rect" ? target.id : null;
        renderCanvasObjects();

        if (target?.type === "rect") {
          pushUndo();
          state.dragMode = target === selected && handle && pointInBounds(point, handle, 8) ? "resize" : "move";
          state.dragStart = point;
          state.dragOrigin = JSON.parse(JSON.stringify(target));
          paintCanvas.setPointerCapture(event.pointerId);
        }
        return;
      }

      if (state.activeTool === "eraser") {
        pushUndo();
        state.drawing = true;
        eraseCanvasObjectAt(point);
        paintCanvas.setPointerCapture(event.pointerId);
        return;
      }

      if (!["pencil", "shape"].includes(state.activeTool)) {
        return;
      }

      pushUndo();
      state.drawing = true;
      state.startPoint = point;
      state.lastPoint = point;
      paintCanvas.setPointerCapture(event.pointerId);

      if (state.activeTool === "shape") {
        state.liveObject = {
          id: makeId(),
          type: "rect",
          x: point.x,
          y: point.y,
          width: 1,
          height: 1
        };
        state.selectedObjectId = state.liveObject.id;
        upsertCanvasObject(state.liveObject);
      }

      if (state.activeTool === "pencil") {
        state.liveObject = {
          id: makeId(),
          type: "stroke",
          points: [point],
          width: 7
        };
        state.selectedObjectId = null;
        upsertCanvasObject(state.liveObject);
      }
    });

    paintCanvas.addEventListener("pointermove", (event) => {
      const point = toPaintPoint(event);

      if (state.dragMode && state.dragStart && state.dragOrigin) {
        const object = selectedCanvasObject();
        if (!object) return;
        const dx = point.x - state.dragStart.x;
        const dy = point.y - state.dragStart.y;
        if (state.dragMode === "move") {
          object.x = state.dragOrigin.x + dx;
          object.y = state.dragOrigin.y + dy;
        }
        if (state.dragMode === "resize") {
          object.width = Math.max(16, state.dragOrigin.width + dx);
          object.height = Math.max(16, state.dragOrigin.height + dy);
        }
        renderCanvasObjects();
        sendCanvasOperation({ kind: "object-upsert", object });
        return;
      }

      if (state.activeTool === "eraser" && state.drawing) {
        eraseCanvasObjectAt(point);
        return;
      }

      if (!state.drawing || !state.liveObject || !state.lastPoint) return;

      if (state.liveObject.type === "rect") {
        state.liveObject.width = point.x - state.liveObject.x;
        state.liveObject.height = point.y - state.liveObject.y;
        upsertCanvasObject(state.liveObject);
        sendCanvasOperation({ kind: "object-upsert", object: state.liveObject });
        return;
      }

      if (state.liveObject.type === "stroke") {
        if (Math.hypot(point.x - state.lastPoint.x, point.y - state.lastPoint.y) < 2) return;
        state.liveObject.points.push(point);
        upsertCanvasObject(state.liveObject);
        sendCanvasOperation({ kind: "object-upsert", object: state.liveObject });
      }
      state.lastPoint = point;
    });

    const finishDrawing = (event) => {
      if (state.dragMode) {
        const object = selectedCanvasObject();
        if (object) {
          normalizeRectObject(object);
          renderCanvasObjects();
          sendCanvasOperation({ kind: "object-upsert", object });
          broadcastRoomState(true);
        }
        state.dragMode = null;
        state.dragStart = null;
        state.dragOrigin = null;
        return;
      }

      if (state.activeTool === "eraser" && state.drawing) {
        state.drawing = false;
        broadcastRoomState(true);
        return;
      }

      if (!state.drawing || !state.liveObject) return;

      if (state.liveObject.type === "rect") {
        normalizeRectObject(state.liveObject);
        upsertCanvasObject(state.liveObject);
        const bounds = objectBounds(state.liveObject);
        if (!bounds || bounds.width < 10 || bounds.height < 10) {
          removeCanvasObject(state.liveObject.id);
          sendCanvasOperation({ kind: "object-remove", objectId: state.liveObject.id });
        } else {
          sendCanvasOperation({ kind: "object-upsert", object: state.liveObject });
        }
      }

      if (state.liveObject.type === "stroke") {
        sendCanvasOperation({ kind: "object-upsert", object: state.liveObject });
      }

      state.drawing = false;
      state.startPoint = null;
      state.lastPoint = null;
      state.liveObject = null;
      shapePreview.style.display = "none";
      broadcastRoomState(true);
    };

    paintCanvas.addEventListener("pointerup", finishDrawing);
    paintCanvas.addEventListener("pointercancel", finishDrawing);
    paintCanvas.addEventListener("wheel", (event) => {
      if (state.screen !== "studio") return;
      event.preventDefault();
      zoomCanvasAt(event, event.deltaY < 0 ? 1.1 : 0.9);
    }, { passive: false });

    const drawArrowHead = (from, to) => {
      const angle = Math.atan2(to.y - from.y, to.x - from.x);
      const size = 24;
      paintCtx.save();
      paintCtx.strokeStyle = "#000";
      paintCtx.lineWidth = 7;
      paintCtx.beginPath();
      paintCtx.moveTo(to.x, to.y);
      paintCtx.lineTo(to.x - size * Math.cos(angle - Math.PI / 6), to.y - size * Math.sin(angle - Math.PI / 6));
      paintCtx.moveTo(to.x, to.y);
      paintCtx.lineTo(to.x - size * Math.cos(angle + Math.PI / 6), to.y - size * Math.sin(angle + Math.PI / 6));
      paintCtx.stroke();
      paintCtx.restore();
    };

    const composeStudioImage = async () => {
      const output = document.createElement("canvas");
      output.width = DESIGN.width;
      output.height = DESIGN.height;
      const outputCtx = output.getContext("2d");
      outputCtx.fillStyle = "#f7f4eb";
      outputCtx.fillRect(0, 0, DESIGN.width, DESIGN.height);
      outputCtx.fillStyle = "#fffefa";
      outputCtx.fillRect(PAINT.x, PAINT.y, PAINT.width, PAINT.height);
      outputCtx.drawImage(paintCanvas, PAINT.x, PAINT.y, PAINT.width, PAINT.height);
      drawNotesForExport(outputCtx);
      return output.toDataURL("image/png");
    };

    const drawImageElement = (ctx, image, x, y, width, height) => new Promise((resolve) => {
      if (image.complete) {
        ctx.drawImage(image, x, y, width, height);
        resolve();
        return;
      }
      image.onload = () => {
        ctx.drawImage(image, x, y, width, height);
        resolve();
      };
    });

    const drawNotesForExport = (ctx) => {
      ctx.save();
      ctx.font = "900 26px Malgun Gothic, sans-serif";
      ctx.lineWidth = 6;
      ctx.strokeStyle = "#000";
      ctx.fillStyle = "#fff";
      state.notes.forEach((note) => {
        const x = PAINT.x + note.x;
        const y = PAINT.y + note.y;
        const text = note.text || "메모";
        const width = Math.max(170, ctx.measureText(text).width + 34);
        const height = 62;
        ctx.fillRect(x, y, width, height);
        ctx.strokeRect(x, y, width, height);
        ctx.fillStyle = "#000";
        ctx.fillText(text, x + 16, y + 40);
        ctx.fillStyle = "#fff";
      });
      ctx.restore();
    };

    const loadAppConfig = async () => {
      if (location.protocol === "file:") {
        appConfig.loaded = true;
        scheduleDisqusMount();
        return;
      }

      try {
        const response = await fetch("/api/config", { cache: "no-store" });
        if (!response.ok) throw new Error("config unavailable");
        const config = await response.json();
        const shortname = sanitizeDisqusShortname(config.disqusShortname);
        if (shortname) {
          appConfig.disqusShortname = shortname;
          renderResults();
        }
      } catch {
        appConfig.disqusShortname = sanitizeDisqusShortname(window.VILLAIN_DISQUS_SHORTNAME || DEFAULT_DISQUS_SHORTNAME);
      } finally {
        appConfig.loaded = true;
        scheduleDisqusMount();
      }
    };

    const getDisqusShortname = () => sanitizeDisqusShortname(
      window.VILLAIN_DISQUS_SHORTNAME || appConfig.disqusShortname
    );

    const getShareIdentifier = (share) => (
      share.disqusIdentifier || `art-room-${share.roomKey || currentRoomKey()}-share-${share.id}`
    );

    const getShareUrl = (share) => {
      const url = (location.protocol === "http:" || location.protocol === "https:")
        ? new URL(location.href)
        : new URL("https://art-realtime.local/");
      url.searchParams.set("room", share.roomKey || currentRoomKey());
      url.searchParams.set("share", share.id);
      url.hash = `share-${share.id}`;
      return url.href;
    };

    const getRoomUrl = (roomKey = currentRoomKey()) => {
      const url = (location.protocol === "http:" || location.protocol === "https:")
        ? new URL(location.href)
        : new URL("https://art-realtime.local/");
      url.searchParams.set("room", roomKey);
      url.searchParams.delete("share");
      url.hash = "";
      return url.href;
    };

    const updateRoomRoute = () => {
      if (!(location.protocol === "http:" || location.protocol === "https:")) return;
      const url = new URL(location.href);
      url.searchParams.set("room", currentRoomKey());
      url.searchParams.delete("share");
      url.hash = "";
      history.replaceState(null, "", url);
    };

    const clearRoomRoute = () => {
      if (!(location.protocol === "http:" || location.protocol === "https:")) return;
      const url = new URL(location.href);
      url.searchParams.delete("room");
      url.searchParams.delete("share");
      url.hash = "";
      history.replaceState(null, "", url);
    };

    const copyRoomLink = async () => {
      try {
        await navigator.clipboard.writeText(getRoomUrl());
        showToast("협업 링크 복사 완료");
      } catch {
        showToast("협업 링크를 복사하지 못했습니다.");
      }
    };

    const updateShareRoute = (share) => {
      if (!(location.protocol === "http:" || location.protocol === "https:")) return;
      const url = new URL(location.href);
      if (share) {
        url.searchParams.set("room", share.roomKey || currentRoomKey());
        url.searchParams.set("share", share.id);
        url.hash = `share-${share.id}`;
      } else {
        url.searchParams.delete("share");
        url.hash = "";
      }
      history.replaceState(null, "", url);
    };

    const copyShareLink = async (share) => {
      const url = getShareUrl(share);
      try {
        await navigator.clipboard.writeText(url);
        showToast("공유 링크 복사 완료");
      } catch {
        showToast("공유 링크를 복사하지 못했습니다.");
      }
    };

    const refreshShareSummary = (share) => {
      const card = document.getElementById(`share-${share.id}`);
      if (!card) return;
      const meta = $(".share-meta", card);
      if (meta) {
        meta.textContent = `${share.author} · 실시간 댓글 ${share.comments.length}개`;
      }
      const reaction = $('[data-result-action="react"]', card);
      if (reaction) {
        reaction.textContent = `반응 ${share.reactions || 0}`;
      }
    };

    const mirrorDisqusComment = (shareId, comment) => {
      const share = state.shares.find((item) => String(item.id) === String(shareId));
      const text = String(comment?.text || "").trim();
      if (!share || !text) return;

      share.comments = Array.isArray(share.comments) ? share.comments : [];
      const id = `disqus-${comment?.id || makeId()}`;
      if (share.comments.some((item) => item.id === id)) return;

      const mirrored = {
        id,
        author: "Disqus",
        text,
        provider: "disqus",
        createdAt: Date.now()
      };
      share.comments.push(mirrored);
      if (String(share.id) === String(state.activeDisqusShareId)) {
        refreshShareSummary(share);
      } else {
        renderResults();
      }
      saveState();
      sendRealtime({
        type: "comment",
        shareId: share.id,
        comment: mirrored
      });
    };

    const scheduleDisqusMount = () => {
      if (!state.activeDisqusShareId) return;
      requestAnimationFrame(mountDisqusThread);
    };

    const mountDisqusThread = () => {
      const mount = $("#disqus_thread");
      if (!mount || !state.activeDisqusShareId) return;

      const share = state.shares.find((item) => String(item.id) === String(state.activeDisqusShareId));
      if (!share) return;

      const shortname = getDisqusShortname();
      if (!shortname) {
        mount.innerHTML = '<div class="disqus-state">Disqus shortname 설정 필요<br>Cloudflare 변수 DISQUS_SHORTNAME을 추가하세요.</div>';
        return;
      }

      const identifier = getShareIdentifier(share);
      const config = function () {
        this.page = this.page || {};
        this.callbacks = this.callbacks || {};
        this.page.url = getShareUrl(share);
        this.page.identifier = identifier;
        this.page.title = share.title;
        this.callbacks.onNewComment = [function (comment) {
          mirrorDisqusComment(share.id, comment);
        }];
      };

      window.disqus_config = config;
      if (window.DISQUS?.reset) {
        window.DISQUS.reset({ reload: true, config });
        return;
      }

      if ($("#disqus-embed-script")) return;
      const script = document.createElement("script");
      script.id = "disqus-embed-script";
      script.src = `https://${shortname}.disqus.com/embed.js`;
      script.async = true;
      script.setAttribute("data-timestamp", String(Date.now()));
      (document.head || document.body).appendChild(script);
    };

    const setActiveDisqusShare = (shareId) => {
      state.activeDisqusShareId = shareId ? String(shareId) : null;
      const share = state.shares.find((item) => String(item.id) === String(state.activeDisqusShareId));
      updateShareRoute(share || null);
      renderResults();
      saveState();
      scheduleDisqusMount();
    };

    const ensureShareMeta = (share, index) => {
      share.id = share.id || Date.now() + index;
      share.title = share.title || `결과물 ${String(index + 1).padStart(2, "0")}`;
      share.author = share.author || "조별과제 팀";
      share.reactions = Number.isFinite(share.reactions) ? share.reactions : 0;
      share.comments = Array.isArray(share.comments) ? share.comments : [];
      share.roomKey = share.roomKey || currentRoomKey();
      share.disqusIdentifier = getShareIdentifier(share);
      return share;
    };

    const renderResults = () => {
      resultLayer.innerHTML = "";

      const upload = document.createElement("section");
      upload.className = "result-upload";

      const uploadCopy = document.createElement("div");
      const title = document.createElement("strong");
      title.textContent = "완성본 공유";
      const description = document.createElement("span");
      description.textContent = "팀 완성본과 Disqus 피드백 모음";
      uploadCopy.append(title, description);

      const uploadButton = document.createElement("button");
      uploadButton.type = "button";
      uploadButton.dataset.resultUpload = "true";
      uploadButton.textContent = "결과물 올리기";
      upload.append(uploadCopy, uploadButton);
      resultLayer.appendChild(upload);

      if (!state.shares.length) {
        const empty = document.createElement("article");
        empty.className = "share-card";
        const placeholder = document.createElement("div");
        placeholder.className = "result-upload";
        placeholder.innerHTML = "<strong>공유 대기 중</strong><span>새 완성본 없음</span>";
        empty.appendChild(placeholder);
        resultLayer.appendChild(empty);
        return;
      }

      state.shares.forEach((rawShare, index) => {
        const share = ensureShareMeta(rawShare, index);
        const isDisqusOpen = String(share.id) === String(state.activeDisqusShareId);
        const card = document.createElement("article");
        card.className = "share-card";
        card.id = `share-${share.id}`;

        const image = document.createElement("img");
        image.src = share.image;
        image.alt = share.title;

        const body = document.createElement("div");
        body.className = "share-body";

        const heading = document.createElement("h3");
        heading.className = "share-title";
        heading.textContent = share.title;

        const meta = document.createElement("div");
        meta.className = "share-meta";
        meta.textContent = `${share.author} · 실시간 댓글 ${share.comments.length}개`;

        const actions = document.createElement("div");
        actions.className = "share-actions";

        const react = document.createElement("button");
        react.className = "share-action";
        react.type = "button";
        react.dataset.resultAction = "react";
        react.dataset.result = String(share.id);
        react.textContent = `반응 ${share.reactions}`;

        const shareButton = document.createElement("button");
        shareButton.className = "share-action";
        shareButton.type = "button";
        shareButton.dataset.resultAction = "share";
        shareButton.dataset.result = String(share.id);
        shareButton.textContent = "공유";

        const disqusButton = document.createElement("button");
        disqusButton.className = `share-action${isDisqusOpen ? " is-primary" : ""}`;
        disqusButton.type = "button";
        disqusButton.dataset.resultAction = "disqus";
        disqusButton.dataset.result = String(share.id);
        disqusButton.textContent = isDisqusOpen ? "댓글 열림" : "Disqus 댓글";

        actions.append(react, shareButton, disqusButton);

        const comments = document.createElement("div");
        comments.className = "comment-list";
        share.comments.slice(-3).forEach((comment) => {
          const line = document.createElement("div");
          line.className = "comment-line";
          const author = document.createElement("strong");
          author.textContent = comment.author;
          const text = document.createElement("span");
          text.textContent = comment.text;
          line.append(author, text);
          comments.appendChild(line);
        });

        const form = document.createElement("form");
        form.className = "comment-form";
        form.dataset.resultComment = String(share.id);

        const input = document.createElement("input");
        input.type = "text";
        input.maxLength = 46;
        input.placeholder = "댓글";
        input.setAttribute("aria-label", `${share.title} 댓글`);

        const submit = document.createElement("button");
        submit.type = "submit";
        submit.textContent = "등록";
        form.append(input, submit);

        body.append(heading, meta, actions, comments, form);
        card.append(image, body);
        resultLayer.appendChild(card);

        if (isDisqusOpen) {
          const disqusCard = document.createElement("section");
          disqusCard.className = "disqus-card";
          disqusCard.dataset.disqusFor = String(share.id);

          const disqusHeading = document.createElement("div");
          disqusHeading.className = "disqus-heading";
          const disqusTitle = document.createElement("strong");
          disqusTitle.textContent = `${share.title} 댓글`;
          const close = document.createElement("button");
          close.className = "share-action";
          close.type = "button";
          close.dataset.resultAction = "close-disqus";
          close.dataset.result = String(share.id);
          close.textContent = "닫기";
          disqusHeading.append(disqusTitle, close);

          const thread = document.createElement("div");
          thread.className = "disqus-thread";
          thread.id = "disqus_thread";
          thread.innerHTML = '<div class="disqus-state">Disqus 댓글 로드 중</div>';

          disqusCard.append(disqusHeading, thread);
          resultLayer.appendChild(disqusCard);
        }
      });
      scheduleDisqusMount();
    };

    const roomStateKey = (roomKey = currentRoomKey()) => `${ROOM_STORAGE_PREFIX}:${roomKey}`;

    const loadRoomState = (roomKey = currentRoomKey()) => {
      const raw = localStorage.getItem(roomStateKey(roomKey));
      let roomState = null;
      try {
        roomState = raw ? JSON.parse(raw) : null;
      } catch {
        roomState = null;
      }
      state.notes = Array.isArray(roomState?.notes) ? roomState.notes : [];
      renderNotes();
      if (Array.isArray(roomState?.drawingData?.objects) || Array.isArray(roomState?.objects)) {
        importDrawingData(roomState.drawingData || { objects: roomState.objects });
      } else {
        state.canvasObjects = [];
        state.selectedObjectId = null;
        restoreCanvas(roomState?.canvas || null);
      }
    };

    const saveRoomState = (includeCanvas = true) => {
      if (!state.selectedRoomId) return;
      let previous = null;
      try {
        previous = JSON.parse(localStorage.getItem(roomStateKey()) || "null");
      } catch {
        previous = null;
      }
      const payload = {
        notes: state.notes,
        drawingData: exportDrawingData(),
        canvas: includeCanvas ? paintCanvas.toDataURL("image/png") : previous?.canvas,
        updatedAt: Date.now()
      };
      localStorage.setItem(roomStateKey(), JSON.stringify(payload));
    };

    const storeIncomingRoomState = (canvas, notes, drawingData) => {
      let previous = null;
      try {
        previous = JSON.parse(localStorage.getItem(roomStateKey()) || "null");
      } catch {
        previous = null;
      }
      localStorage.setItem(roomStateKey(), JSON.stringify({
        canvas: canvas || previous?.canvas || null,
        drawingData: drawingData || previous?.drawingData || { objects: state.canvasObjects },
        notes: Array.isArray(notes) ? notes : (previous?.notes || []),
        updatedAt: Date.now()
      }));
    };

    const broadcastRoomState = (includeCanvas = true) => {
      if (state.applyingRemote || state.screen !== "studio") return;
      saveRoomState(includeCanvas);
      sendRealtime({
        type: "canvas-state",
        dataRoom: currentRoomKey(),
        sourceId: localUser.id,
        canvas: includeCanvas ? paintCanvas.toDataURL("image/png") : undefined,
        drawingData: exportDrawingData(),
        notes: state.notes,
        updatedAt: Date.now()
      });
    };

    const saveState = () => {
      const payload = {
        screen: state.screen,
        modalOpen: state.modalOpen,
        darkMode: state.darkMode,
        micMuted: state.micMuted,
        cameraOn: state.cameraOn,
        screenSharing: state.screenSharing,
        commentMode: state.commentMode,
        focusMode: state.focusMode,
        syncReady: state.syncReady,
        versionCount: state.versionCount,
        selectedRoomId: state.selectedRoomId,
        activeDisqusShareId: state.activeDisqusShareId,
        rooms: state.rooms,
        shares: state.shares,
        chatMessages: state.chatMessages,
        participants: state.participants
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    };

    const loadRawState = () => {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
      } catch {
        return null;
      }
    };

    const loadState = () => {
      const saved = loadRawState();
      if (!saved) return;
      state.modalOpen = Boolean(saved.modalOpen);
      state.darkMode = Boolean(saved.darkMode);
      state.micMuted = Boolean(saved.micMuted);
      state.cameraOn = Boolean(saved.cameraOn);
      state.screenSharing = Boolean(saved.screenSharing);
      state.commentMode = Boolean(saved.commentMode);
      state.focusMode = Boolean(saved.focusMode);
      state.syncReady = saved.syncReady !== false;
      state.versionCount = Number.isFinite(saved.versionCount) ? saved.versionCount : 0;
      state.selectedRoomId = saved.selectedRoomId || state.selectedRoomId;
      state.activeDisqusShareId = saved.activeDisqusShareId || null;
      state.rooms = Array.isArray(saved.rooms) && saved.rooms.length ? saved.rooms : state.rooms;
      state.shares = Array.isArray(saved.shares) ? saved.shares : [];
      if (Array.isArray(saved.chatMessages) && saved.chatMessages.length) {
        state.chatMessages = saved.chatMessages.filter((message) => (
          message.text !== "캔버스 같이 보고 있어요." &&
          message.text !== "음성 채널이 열렸습니다."
        ));
        if (!state.chatMessages.length) {
          state.chatMessages = [
            { id: 1, author: "시스템", text: "같은 주소로 들어오면 이 캔버스에 함께 접속합니다." }
          ];
        }
      }
      state.participants = Array.isArray(saved.participants) ? saved.participants : [];
      applyModalState();
      applyTheme();
      renderRooms();
      if (saved.canvas || Array.isArray(saved.notes)) {
        localStorage.setItem(roomStateKey(currentRoomKey()), JSON.stringify({
          canvas: saved.canvas,
          notes: Array.isArray(saved.notes) ? saved.notes : [],
          updatedAt: Date.now()
        }));
      }
      loadRoomState();
      renderResults();
      renderCollaborationPanel();
    };

    const applyRouteState = () => {
      if (!(location.protocol === "http:" || location.protocol === "https:")) return;

      const params = new URLSearchParams(location.search);
      const roomParam = params.get("room");
      const hashShare = location.hash.startsWith("#share-") ? location.hash.slice(7) : "";
      const shareParam = params.get("share") || hashShare;

      if (roomParam) {
        const roomId = /^\d+$/.test(roomParam) ? Number(roomParam) : roomParam;
        state.selectedRoomId = roomId;
        if (!state.rooms.some((room) => String(room.id) === String(roomId))) {
          state.rooms.unshift({
            id: roomId,
            name: `${roomParam}의 과제방`,
            custom: true
          });
        }
        renderRooms();
      }

      if (shareParam) {
        state.activeDisqusShareId = decodeURIComponent(shareParam);
        setScreen("result");
        renderResults();
      } else if (roomParam) {
        setScreen("studio");
        updateRoomRoute();
      }
    };

    bottomModal.addEventListener("click", () => {
      if (!state.modalOpen) {
        setModalOpen(true);
      }
    });

    bottomModalTab.addEventListener("click", (event) => {
      event.stopPropagation();
      setModalOpen(!state.modalOpen);
    });

    themeToggle.addEventListener("click", (event) => {
      event.stopPropagation();
      setDarkMode(!state.darkMode);
    });

    $$(".studio-nav-button").forEach((button) => {
      button.addEventListener("click", () => handleSideAction(button.dataset.action));
    });

    collabPanel.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button || !collabPanel.contains(button)) return;

      if (button.dataset.call === "mic") {
        if (!realtime.localStream) {
          startVoiceCall();
          return;
        }
        state.micMuted = !state.micMuted;
        realtime.localStream.getAudioTracks().forEach((track) => {
          track.enabled = !state.micMuted;
        });
        addTeamMessage(localUser.name, state.micMuted ? "마이크를 껐습니다." : "마이크를 켰습니다.");
        broadcastPresence();
        saveState();
      }

      if (button.dataset.call === "camera") {
        state.cameraOn = !state.cameraOn;
        addTeamMessage(localUser.name, state.cameraOn ? "카메라 상태를 켰습니다." : "카메라 상태를 껐습니다.");
        broadcastPresence();
        saveState();
      }

      if (button.dataset.call === "screen") {
        state.screenSharing = !state.screenSharing;
        addTeamMessage(localUser.name, state.screenSharing ? "화면 공유 상태를 켰습니다." : "화면 공유 상태를 껐습니다.");
        broadcastPresence();
        saveState();
      }

      if (button.dataset.feature === "comment") {
        state.commentMode = !state.commentMode;
        if (state.commentMode) {
          setTool("text", true);
        }
        addTeamMessage(localUser.name, state.commentMode ? "댓글 핀 모드를 켰습니다." : "댓글 핀 모드를 껐습니다.");
        renderCollaborationPanel();
        saveState();
      }

      if (button.dataset.feature === "version") {
        state.versionCount += 1;
        broadcastRoomState(true);
        saveState();
        addTeamMessage("시스템", `버전 ${state.versionCount} 저장 완료`);
        renderCollaborationPanel();
      }

      if (button.dataset.feature === "focus") {
        state.focusMode = !state.focusMode;
        addTeamMessage(localUser.name, state.focusMode ? "집중 모드를 켰습니다." : "집중 모드를 껐습니다.");
        renderCollaborationPanel();
        saveState();
      }

      if (button.dataset.feature === "sync") {
        state.syncReady = false;
        renderCollaborationPanel();
        setTimeout(() => {
          state.syncReady = true;
          addTeamMessage("시스템", "팀 변경사항 동기화 완료");
          renderCollaborationPanel();
          saveState();
        }, 650);
      }
    });

    chatForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const message = chatInput.value.trim();
      if (!message) return;
      chatInput.value = "";
      addTeamMessage(localUser.name, message, { broadcast: true });
    });

    resultLayer.addEventListener("click", async (event) => {
      const button = event.target.closest("button");
      if (!button || !resultLayer.contains(button)) return;

      if (button.dataset.resultUpload) {
        resultUpload.click();
        return;
      }

      const share = state.shares.find((item) => String(item.id) === button.dataset.result);
      if (!share) return;

      if (button.dataset.resultAction === "react") {
        share.reactions = (share.reactions || 0) + 1;
        if (String(share.id) === String(state.activeDisqusShareId)) {
          refreshShareSummary(share);
        } else {
          renderResults();
        }
        saveState();
        sendRealtime({
          type: "reaction",
          shareId: share.id,
          reactions: share.reactions
        });
      }

      if (button.dataset.resultAction === "share") {
        await copyShareLink(share);
      }

      if (button.dataset.resultAction === "disqus") {
        setActiveDisqusShare(share.id);
      }

      if (button.dataset.resultAction === "close-disqus") {
        setActiveDisqusShare(null);
      }
    });

    resultLayer.addEventListener("submit", (event) => {
      const form = event.target.closest(".comment-form");
      if (!form) return;
      event.preventDefault();

      const share = state.shares.find((item) => String(item.id) === form.dataset.resultComment);
      const input = $("input", form);
      const text = input.value.trim();
      if (!share || !text) return;

      share.comments = Array.isArray(share.comments) ? share.comments : [];
      const comment = { id: makeId(), author: localUser.name, text };
      share.comments.push(comment);
      input.value = "";
      if (String(share.id) === String(state.activeDisqusShareId)) {
        refreshShareSummary(share);
      } else {
        renderResults();
      }
      saveState();
      sendRealtime({
        type: "comment",
        shareId: share.id,
        comment
      });
    });

    resultUpload.addEventListener("change", () => {
      const file = resultUpload.files?.[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        const baseName = file.name.replace(/\.[^.]+$/, "") || "업로드 결과물";
        const share = {
          id: Date.now(),
          title: baseName,
          image: reader.result,
          author: localUser.name,
          roomKey: currentRoomKey(),
          reactions: 0,
          comments: []
        };
        share.disqusIdentifier = getShareIdentifier(share);
        state.shares.unshift(share);
        sendRealtime({ type: "share", share });
        resultUpload.value = "";
        renderResults();
        saveState(true);
        showToast("결과물 업로드 완료");
      };
      reader.readAsDataURL(file);
    });

    $$(".home-card").forEach((button) => {
      button.addEventListener("click", () => setScreen(button.dataset.homeScreen));
    });

    $$(".nav-hotspots [data-screen]").forEach((button) => {
      button.addEventListener("click", () => setScreen(button.dataset.screen));
    });

    window.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z") {
        const previous = state.undoStack.pop();
        if (previous) {
          if (previous.objects) {
            importDrawingData(previous);
            broadcastRoomState(true);
          } else {
            restoreCanvas(previous);
          }
          showToast("되돌리기");
        }
      }

      if (event.key === "Enter" && state.screen === "workspace") {
        enterSelectedRoom();
      }

      if (event.key === "Escape" && state.screen === "studio") {
        setScreen("workspace");
      }
    });

    window.addEventListener("resize", fitFrame);

    fitFrame();
    sizePaintCanvas();
    renderStudioControls();
    renderRooms();
    renderCollaborationPanel();
    setTool("pencil", true);
    applyCanvasView();
    applyModalState();
    applyTheme();
    loadState();
    applyRouteState();
    loadAppConfig();
  </script>
</body>
</html>
