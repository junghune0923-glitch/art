<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>새 웹페이지</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f6f3;
      --panel: #ffffff;
      --ink: #151515;
      --muted: #6c6c63;
      --line: #d9d7cf;
      --accent: #1e6bff;
      --accent-soft: #eaf1ff;
      --radius: 8px;
      --max: 1120px;
      font-family: Pretendard, "Malgun Gothic", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background: var(--bg);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .site-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(14px);
    }

    .topbar-inner {
      width: min(var(--max), calc(100% - 32px));
      height: 64px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav a {
      color: var(--muted);
      text-decoration: none;
      padding: 8px 10px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 700;
    }

    .nav a:hover,
    .nav a:focus-visible {
      color: var(--ink);
      background: var(--accent-soft);
      outline: 0;
    }

    main {
      flex: 1;
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    .hero {
      display: grid;
      gap: 18px;
      max-width: 740px;
      padding-bottom: 44px;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }

    h2 {
      margin: 0;
      font-size: clamp(34px, 5vw, 64px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .lead {
      margin: 0;
      max-width: 620px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.65;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 24px;
      align-items: start;
    }

    .section,
    .comments {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .section {
      min-height: 360px;
      padding: 28px;
    }

    .section h3,
    .comments h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .section p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .comments {
      padding: 20px;
    }

    #disqus_thread {
      min-height: 260px;
    }

    .comment-state {
      min-height: 220px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 20px;
    }

    footer {
      border-top: 1px solid var(--line);
    }

    .footer-inner {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
      padding: 20px 0;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 820px) {
      .topbar-inner {
        height: auto;
        padding: 14px 0;
        align-items: flex-start;
        flex-direction: column;
      }

      .nav {
        width: 100%;
        overflow-x: auto;
      }

      main {
        padding: 36px 0;
      }

      .content-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <h1 class="brand">새 웹페이지</h1>
        <nav class="nav" aria-label="주요 메뉴">
          <a href="#content">콘텐츠</a>
          <a href="#comments">댓글</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero" aria-labelledby="pageTitle">
        <p class="eyebrow">New Page</p>
        <h2 id="pageTitle">새 웹페이지를 시작합니다.</h2>
        <p class="lead">이 파일을 기준으로 새 화면, 섹션, 인터랙션을 추가하면 됩니다.</p>
      </section>

      <div class="content-grid">
        <section class="section" id="content" aria-labelledby="contentTitle">
          <h3 id="contentTitle">콘텐츠 영역</h3>
          <p>새 웹페이지의 실제 내용을 이 영역부터 구성하세요.</p>
        </section>

        <aside class="comments" id="comments" aria-labelledby="commentsTitle">
          <h3 id="commentsTitle">댓글</h3>
          <div id="disqus_thread">
            <div class="comment-state">댓글을 불러오는 중입니다.</div>
          </div>
        </aside>
      </div>
    </main>

    <footer>
      <div class="footer-inner">Cloudflare Worker와 Disqus 설정은 기존 배포 흐름을 사용합니다.</div>
    </footer>
  </div>

  <script>
    const DEFAULT_DISQUS_SHORTNAME = "asd232cas";

    const sanitizeDisqusShortname = (value) => String(value || "")
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9-]/g, "");

    const appConfig = {
      disqusShortname: sanitizeDisqusShortname(window.VILLAIN_DISQUS_SHORTNAME || DEFAULT_DISQUS_SHORTNAME)
    };

    const getDisqusShortname = () => sanitizeDisqusShortname(
      window.VILLAIN_DISQUS_SHORTNAME || appConfig.disqusShortname || DEFAULT_DISQUS_SHORTNAME
    );

    const getPageUrl = () => {
      if (location.protocol === "http:" || location.protocol === "https:") {
        const url = new URL(location.href);
        url.hash = "";
        return url.href;
      }
      return "https://art-realtime.local/";
    };

    const loadAppConfig = async () => {
      if (location.protocol === "file:") {
        mountDisqus();
        return;
      }

      try {
        const response = await fetch("/api/config", { cache: "no-store" });
        if (!response.ok) throw new Error("config unavailable");
        const config = await response.json();
        const shortname = sanitizeDisqusShortname(config.disqusShortname);
        if (shortname) appConfig.disqusShortname = shortname;
      } catch {
        appConfig.disqusShortname = getDisqusShortname();
      } finally {
        mountDisqus();
      }
    };

    const mountDisqus = () => {
      const mount = document.getElementById("disqus_thread");
      if (!mount) return;

      const shortname = getDisqusShortname();
      if (!shortname) {
        mount.innerHTML = '<div class="comment-state">Disqus shortname 설정이 필요합니다.</div>';
        return;
      }

      const config = function () {
        this.page = this.page || {};
        this.page.url = getPageUrl();
        this.page.identifier = "new-webpage-root";
        this.page.title = document.title;
      };

      window.disqus_config = config;
      if (window.DISQUS?.reset) {
        window.DISQUS.reset({ reload: true, config });
        return;
      }

      if (document.getElementById("disqus-embed-script")) return;
      const script = document.createElement("script");
      script.id = "disqus-embed-script";
      script.src = `https://${shortname}.disqus.com/embed.js`;
      script.async = true;
      script.setAttribute("data-timestamp", String(Date.now()));
      (document.head || document.body).appendChild(script);
    };

    loadAppConfig();
  </script>
</body>
</html>
