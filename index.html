<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>너... 빌런이야?</title>
  <style>
    :root {
      --ink: #000;
      --paper: #fff;
      --modal-surface: #f5f5f5;
      --modal-shadow: rgba(0, 0, 0, 0.2);
      --muted-ink: #555;
      --surface: #f7f7f7;
      --surface-strong: #fff;
      --accent: #2f7dff;
      --accent-soft: #dbe8ff;
      --success: #20a35b;
      --danger: #d73b2e;
      --art-filter: none;
      --scale: 1;
      --font-heavy: "Arial Black", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      --font-ui: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-heavy);
      letter-spacing: 0;
    }

    body.dark-mode {
      --ink: #f6f6f6;
      --paper: #101010;
      --modal-surface: #1b1b1b;
      --modal-shadow: rgba(255, 255, 255, 0.16);
      --muted-ink: #cfcfcf;
      --surface: #171717;
      --surface-strong: #232323;
      --accent: #7fb2ff;
      --accent-soft: #183052;
      --success: #71d69a;
      --danger: #ff8378;
      --art-filter: invert(1) contrast(0.96);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-frame {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: var(--paper);
      transform: translate(-50%, -50%) scale(var(--scale));
      transform-origin: center;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
    }

    .screen.active {
      display: block;
    }

    .mockup {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
      user-select: none;
    }

    .hotspot {
      position: absolute;
      z-index: 30;
      padding: 0;
      color: transparent;
      background: transparent;
      border: 0;
      outline: 0;
    }

    .hotspot:focus-visible,
    .search-field:focus-visible {
      outline: 5px dashed rgba(0, 0, 0, 0.7);
      outline-offset: 6px;
    }

    body.dark-mode .hotspot:focus-visible,
    body.dark-mode .search-field:focus-visible {
      outline-color: rgba(255, 255, 255, 0.86);
    }

    .mockup,
    .paint-canvas,
    .result-card img {
      filter: var(--art-filter);
      transition: filter 180ms ease;
    }

    .nav-hotspots {
      position: absolute;
      inset: 0;
      z-index: 50;
      pointer-events: none;
    }

    .nav-hotspots .hotspot {
      pointer-events: auto;
    }

    .nav-main {
      left: 560px;
      top: 73px;
      width: 216px;
      height: 86px;
      border-radius: 999px;
    }

    .nav-workspace {
      left: 852px;
      top: 73px;
      width: 218px;
      height: 86px;
      border-radius: 999px;
    }

    .nav-result {
      left: 1144px;
      top: 73px;
      width: 216px;
      height: 86px;
      border-radius: 999px;
    }

    .nav-share-tab {
      left: 1424px;
      top: 73px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 216px;
      height: 86px;
      color: var(--paper);
      background: var(--ink);
      border: 6px solid var(--ink);
      border-radius: 999px;
      box-shadow: 5px 5px 0 var(--modal-shadow);
      font-family: var(--font-heavy);
      font-size: 31px;
      font-weight: 900;
    }

    .is-studio .nav-hotspots {
      display: none;
    }

    .workspace-controls,
    .workspace-rows,
    .studio-controls,
    .result-layer {
      position: absolute;
      inset: 0;
      z-index: 35;
      pointer-events: none;
    }

    .workspace-controls > *,
    .workspace-rows > *,
    .studio-controls > *,
    .result-layer > * {
      pointer-events: auto;
    }

    .create-room {
      left: 383px;
      top: 256px;
      width: 340px;
      height: 86px;
      border-radius: 18px;
    }

    .delete-room {
      left: 749px;
      top: 256px;
      width: 340px;
      height: 86px;
      border-radius: 18px;
    }

    .search-field {

      left: 1184px;
      top: 264px;
      z-index: 36;
      width: 330px;
      height: 70px;
      padding: 0 20px;
      color: var(--ink);
      background: transparent;
      border: 0;
      outline: 0;
      font-family: var(--font-heavy);
      font-size: 32px;
      font-weight: 900;
      text-align: center;
    }

    .search-field::placeholder {
      color: transparent;
    }

    .room-hit {
      left: 386px;
      width: 1150px;
      height: 87px;
      border-radius: 22px;
    }

    .room-hit[data-row="0"] { top: 366px; }
    .room-hit[data-row="1"] { top: 493px; }
    .room-hit[data-row="2"] { top: 621px; }
    .room-hit[data-row="3"] { top: 749px; }
    .room-hit[data-row="4"] { top: 877px; }

    .custom-room-label {
      position: absolute;
      left: 456px;
      z-index: 25;
      min-width: 190px;
      padding: 2px 10px;
      color: var(--ink);
      background: var(--paper);
      font-size: 31px;
      font-weight: 900;
      line-height: 1;
      pointer-events: none;
    }

    .custom-room-label[data-row="0"] { top: 397px; }
    .custom-room-label[data-row="1"] { top: 525px; }
    .custom-room-label[data-row="2"] { top: 653px; }
    .custom-room-label[data-row="3"] { top: 781px; }
    .custom-room-label[data-row="4"] { top: 909px; }

    .room-meta {
      position: absolute;
      left: 1166px;
      z-index: 26;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 270px;
      padding: 8px 16px;
      color: var(--ink);
      background: var(--surface-strong);
      border: 4px solid var(--ink);
      border-radius: 999px;
      font-family: var(--font-ui);
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      pointer-events: none;
    }

    .room-meta::before {
      width: 13px;
      height: 13px;
      background: var(--success);
      border: 3px solid var(--ink);
      border-radius: 50%;
      content: "";
    }

    .room-meta[data-row="0"] { top: 392px; }
    .room-meta[data-row="1"] { top: 520px; }
    .room-meta[data-row="2"] { top: 648px; }
    .room-meta[data-row="3"] { top: 776px; }
    .room-meta[data-row="4"] { top: 904px; }

    #homeScreen,
    #resultScreen {
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--ink) transparent;
    }

    #homeScreen::-webkit-scrollbar,
    #resultScreen::-webkit-scrollbar {
      width: 18px;
    }

    #homeScreen::-webkit-scrollbar-thumb,
    #resultScreen::-webkit-scrollbar-thumb {
      background: var(--ink);
      border: 4px solid var(--paper);
      border-radius: 999px;
    }

    .home-content {
      position: absolute;
      top: 760px;
      left: 286px;
      z-index: 36;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      width: 1348px;
      min-height: 760px;
      padding-bottom: 120px;
      color: var(--ink);
      font-family: var(--font-ui);
    }

    .home-panel,
    .home-card,
    .workspace-rows .room-card,
    .result-upload,
    .share-card {
      background: var(--surface-strong);
      border: 6px solid var(--ink);
      box-shadow: 7px 7px 0 var(--ink);
    }

    .home-panel {
      min-height: 326px;
      padding: 34px;
      border-radius: 30px;
    }

    .home-panel h2,
    .home-card strong {
      margin: 0;
      font-size: 38px;
      font-weight: 900;
      line-height: 1;
    }

    .home-panel p {
      margin: 18px 0 0;
      color: var(--muted-ink);
      font-size: 24px;
      font-weight: 900;
      line-height: 1.35;
    }

    .home-card-stack {
      display: grid;
      gap: 20px;
    }

    .home-card {
      min-height: 153px;
      padding: 25px 28px;
      color: var(--ink);
      border-radius: 24px;
      font-family: var(--font-ui);
      text-align: left;
    }

    .home-card span {
      display: block;
      margin-top: 12px;
      color: var(--muted-ink);
      font-size: 20px;
      font-weight: 900;
      line-height: 1.2;
    }

    .workspace-rows {
      inset: auto;
      left: 386px;
      top: 366px;
      z-index: 36;
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 1240px;
      height: 650px;
      padding: 0 88px 34px 0;
      overflow-x: hidden;
      overflow-y: auto;
      pointer-events: auto;
      scrollbar-width: auto;
      scrollbar-color: var(--ink) transparent;
    }

    .workspace-rows::-webkit-scrollbar {
      width: 24px;
    }

    .workspace-rows::-webkit-scrollbar-track {
      background: transparent;
      border: 4px solid var(--ink);
      border-radius: 999px;
    }

    .workspace-rows::-webkit-scrollbar-thumb {
      background: var(--ink);
      border: 5px solid var(--paper);
      border-radius: 999px;
    }

    .workspace-rows .room-card {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 26px;
      width: 100%;
      min-height: 88px;
      padding: 0 34px 0 42px;
      color: var(--ink);
      border-radius: 24px;
      font-family: var(--font-ui);
      text-align: left;
      transition: background 140ms ease, color 140ms ease, transform 140ms ease;
    }

    .workspace-rows .room-card:hover {
      transform: translate(3px, 3px);
      box-shadow: 4px 4px 0 var(--ink);
    }

    .workspace-rows .room-card.is-selected {
      color: var(--paper);
      background: var(--ink);
    }

    .room-card-name {
      overflow: hidden;
      font-size: 31px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .room-card-meta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 214px;
      padding: 10px 16px;
      color: inherit;
      background: var(--surface);
      border: 4px solid currentColor;
      border-radius: 999px;
      font-size: 19px;
      font-weight: 900;
      line-height: 1;
    }

    .room-card-meta::before {
      width: 13px;
      height: 13px;
      background: var(--success);
      border: 3px solid currentColor;
      border-radius: 50%;
      content: "";
    }

    .room-card.is-selected .room-card-meta {
      background: var(--ink);
    }

    .selected-room-mark {
      position: absolute;
      left: 388px;
      width: 1146px;
      height: 83px;
      z-index: 24;
      display: none;
      border: 6px solid var(--ink);
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.08);
      pointer-events: none;
    }

    .selected-room-mark.show {
      display: block;
    }

    .paint-canvas {
      position: absolute;
      left: 354px;
      top: 0;
      z-index: 12;
      width: 1566px;
      height: 1080px;
      touch-action: none;
      transform-origin: 0 0;
    }

    .note-layer {
      position: absolute;
      left: 354px;
      top: 0;
      z-index: 15;
      width: 1566px;
      height: 1080px;
      pointer-events: none;
      transform-origin: 0 0;
    }

    .note-card {
      position: absolute;
      min-width: 170px;
      min-height: 58px;
      padding: 13px 16px;
      color: var(--ink);
      background: var(--paper);
      border: 6px solid var(--ink);
      border-radius: 18px 14px 19px 13px;
      font-family: var(--font-ui);
      font-size: 26px;
      font-weight: 900;
      line-height: 1.2;
      outline: 0;
      pointer-events: auto;
      transform: rotate(-0.4deg);
    }

    .shape-preview {
      position: absolute;
      z-index: 18;
      display: none;
      border: 6px solid var(--ink);
      border-radius: 18px 14px 21px 15px;
      pointer-events: none;
    }

    #studioScreen::before {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 2;
      width: 388px;
      height: 1080px;
      background:
        linear-gradient(var(--ink) 2px, transparent 2px) 0 0 / 59px 58px,
        linear-gradient(90deg, var(--ink) 2px, transparent 2px) 0 0 / 59px 58px,
        var(--paper);
      content: "";
    }

    .studio-controls {
      display: none;
    }

    .is-studio .studio-controls {
      position: absolute;
      top: 36px;
      left: 38px;
      z-index: 76;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 252px;
      max-height: 1008px;
      padding: 16px;
      overflow-y: auto;
      color: var(--ink);
      background: var(--surface);
      border: 6px solid var(--ink);
      border-radius: 24px;
      box-shadow: 8px 8px 0 var(--ink);
      font-family: var(--font-ui);
    }

    .tool-hot {
      position: static;
      z-index: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 68px;
      padding: 0 6px;
      color: var(--ink);
      background: var(--surface-strong);
      border: 4px solid var(--ink);
      border-radius: 14px;
      font-family: var(--font-ui);
      font-size: 15px;
      font-weight: 900;
      line-height: 1.05;
      text-align: center;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .tool-hot.is-active {
      color: var(--paper);
      background: var(--ink);
    }

    .tool-cursor {
      position: absolute;
      z-index: 29;
      display: none;
      width: 94px;
      height: 80px;
      border: 5px solid var(--ink);
      border-radius: 9px;
      pointer-events: none;
    }

    .tool-cursor.show {
      display: block;
    }

    .side-hot {
      left: 1676px;
      width: 216px;
      border-radius: 18px;
    }

    .side-hot[data-action="leave"] { top: 39px; height: 103px; }
    .side-hot[data-action="save"] { top: 222px; height: 99px; }
    .side-hot[data-action="share"] { top: 405px; height: 100px; }
    .side-hot[data-action="export"] { top: 582px; height: 116px; }

    .person-hot {
      top: 789px;
      width: 288px;
      height: 220px;
      border-radius: 24px;
    }

    .person-hot[data-person="0"] { left: 84px; }
    .person-hot[data-person="1"] { left: 435px; }
    .person-hot[data-person="2"] { left: 786px; }
    .person-hot[data-person="3"] { left: 1138px; }

    .studio-bottom-cover,
    .studio-side-cover,
    .studio-topbar,
    .collab-panel {
      display: none;
    }

    .is-studio .studio-bottom-cover {
      position: absolute;
      left: 0;
      right: 354px;
      bottom: 0;
      z-index: 31;
      display: none;
      height: 304px;
      background: var(--paper);
      border-top: 6px solid var(--ink);
      pointer-events: none;
    }

    .is-studio .studio-side-cover {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      z-index: 32;
      display: none;
      width: 354px;
      background: var(--paper);
      border-left: 6px solid var(--ink);
      pointer-events: none;
    }

    .is-studio .bottom-modal {
      display: none;
    }

    .is-studio .studio-topbar {
      position: absolute;
      top: 22px;
      left: 374px;
      z-index: 70;
      display: flex;
      align-items: center;
      width: 1172px;
      min-height: 76px;
      padding: 10px 14px 10px 20px;
      color: var(--ink);
      background: var(--surface);
      border: 6px solid var(--ink);
      border-radius: 22px;
      box-shadow: 6px 6px 0 var(--ink);
      font-family: var(--font-ui);
    }

    .studio-room-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 260px;
      font-weight: 900;
      line-height: 1;
    }

    .studio-room-meta strong {
      font-size: 26px;
    }

    .studio-room-meta span {
      color: var(--muted-ink);
      font-size: 16px;
    }

    .studio-nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .studio-nav-button,
    .call-control,
    .feature-chip,
    .participant-row,
    .chat-send {
      color: var(--ink);
      background: var(--surface-strong);
      border: 4px solid var(--ink);
      font-family: var(--font-ui);
      font-weight: 900;
    }

    .studio-nav-button {
      min-width: 116px;
      height: 48px;
      padding: 0 16px;
      border-radius: 999px;
      font-size: 18px;
      line-height: 1;
    }

    .studio-nav-button[data-action="leave"] {
      color: var(--paper);
      background: var(--danger);
    }

    .studio-nav-button[data-action="share"] {
      color: #fff;
      background: var(--accent);
    }

    .is-studio .collab-panel {
      position: absolute;
      top: 126px;
      right: 28px;
      bottom: 34px;
      z-index: 70;
      display: flex;
      flex-direction: column;
      width: 318px;
      padding: 18px;
      color: var(--ink);
      background: var(--surface);
      border: 6px solid var(--ink);
      border-radius: 26px;
      box-shadow: 7px 7px 0 var(--ink);
      font-family: var(--font-ui);
    }

    .collab-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      font-weight: 900;
    }

    .collab-heading strong {
      font-size: 27px;
      line-height: 1;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 11px;
      color: var(--paper);
      background: var(--success);
      border: 3px solid var(--ink);
      border-radius: 999px;
      font-size: 14px;
      line-height: 1;
    }

    .live-pill::before {
      width: 8px;
      height: 8px;
      background: var(--paper);
      border-radius: 50%;
      content: "";
    }

    .call-status {
      padding: 13px 14px;
      color: var(--muted-ink);
      background: var(--surface-strong);
      border: 4px solid var(--ink);
      border-radius: 18px;
      font-size: 17px;
      font-weight: 900;
      line-height: 1.2;
    }

    .call-controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .call-control {
      height: 58px;
      border-radius: 17px;
      font-size: 15px;
      line-height: 1.05;
    }

    .call-control.is-active {
      color: #fff;
      background: var(--accent);
    }

    .call-control.is-danger {
      color: var(--paper);
      background: var(--danger);
    }

    .panel-label {
      margin: 18px 0 9px;
      color: var(--muted-ink);
      font-size: 15px;
      font-weight: 900;
      line-height: 1;
    }

    .participant-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .participant-row {
      display: grid;
      grid-template-columns: 16px 1fr auto;
      align-items: center;
      gap: 9px;
      width: 100%;
      min-height: 46px;
      padding: 0 11px;
      border-radius: 16px;
      font-size: 15px;
      text-align: left;
    }

    .participant-row.is-muted {
      color: var(--muted-ink);
      background: var(--paper);
    }

    .presence-dot {
      width: 13px;
      height: 13px;
      background: var(--success);
      border: 3px solid var(--ink);
      border-radius: 50%;
    }

    .participant-row.is-muted .presence-dot {
      background: var(--danger);
    }

    .participant-state {
      font-size: 13px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .feature-chip {
      min-height: 44px;
      padding: 0 8px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.05;
    }

    .feature-chip.is-active {
      background: var(--accent-soft);
    }

    .team-chat {
      display: flex;
      flex: 1;
      flex-direction: column;
      min-height: 0;
    }

    .chat-log {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 7px;
      min-height: 84px;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-right: 2px;
    }

    .chat-line {
      padding: 8px 10px;
      background: var(--surface-strong);
      border: 3px solid var(--ink);
      border-radius: 14px;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.2;
    }

    .chat-line strong {
      display: block;
      margin-bottom: 3px;
      color: var(--accent);
      font-size: 12px;
    }

    .chat-form {
      display: grid;
      grid-template-columns: 1fr 62px;
      gap: 8px;
      margin-top: 10px;
    }

    .chat-input {
      width: 100%;
      min-width: 0;
      height: 42px;
      padding: 0 12px;
