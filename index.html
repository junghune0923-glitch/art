        border-color: var(--line);
        border-radius: var(--radius);
        background: rgba(255, 248, 227, .88);
        color: var(--text);
        box-shadow: var(--shadow-panel);
        -webkit-backdrop-filter: blur(14px);
        backdrop-filter: blur(14px);
      }

      .screen-room .room-panel .eyebrow {
        color: var(--cyan);
      }

      .screen-room .room-panel-heading h2,
      .screen-room .room-selected strong {
        color: #423021;
      }

      .screen-room .room-model-status {
        border-color: var(--line);
        color: var(--text-soft);
        background: rgba(255, 250, 235, .86);
        box-shadow: 0 10px 28px rgba(93, 79, 44, .11);
      }

      .screen-room .room-selected {
        gap: 4px;
        border-color: var(--line);
        background: rgba(255, 255, 238, .58);
      }

      .screen-room .room-selected small,
      .screen-room .room-item-button small {
        display: block;
        color: var(--text-muted);
        font-size: 10px;
        font-weight: 700;
      }

      .screen-room .room-item-button {
        display: grid;
        grid-template-columns: 14px minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        min-height: 38px;
        text-align: left;
      }

      .screen-room .room-item-button strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 11px;
      }

      .screen-room .room-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .screen-room .room-actions .secondary-action {
        min-width: 0;
        width: 100%;
        height: 38px;
        padding: 0 10px;
        border-color: rgba(128, 141, 87, .3);
        border-radius: 5px;
        background: rgba(255, 249, 229, .82);
        color: #586147;
        font-size: 11px;
      }

      .screen-room .room-actions .secondary-action:hover:not(:disabled),
      .screen-room .room-actions .secondary-action:focus-visible {
        border-color: rgba(73, 126, 80, .48);
        background: #f2f0d9;
        color: #374630;
      }

      .screen-room .room-item-list:empty {
        display: block;
        min-height: 64px;
        border: 1px dashed rgba(128, 141, 84, .34);
        border-radius: 5px;
        background: rgba(255, 249, 229, .58);
      }

      .screen-room .room-actions .secondary-action:disabled {
        border-color: rgba(128, 141, 84, .22);
        background: rgba(240, 234, 214, .66);
        color: var(--text-muted);
      }

      @media(max-width:760px) {
        .screen-room .room-designer {
          height: calc(100vh - 72px);
        }

        .screen-room .room-panel {
          top: 10px;
          right: 10px;
          width: min(260px, calc(100% - 20px));
          max-height: 42%;
        }
      }
    </style>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
